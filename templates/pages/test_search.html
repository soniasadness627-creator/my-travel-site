{% extends 'base.html' %}
{% load static %}

{% block title %}🔍 Пошук турів - TourConstructor{% endblock %}

{% block content %}
<!-- ЧЕРВОНИЙ БАНЕР-МАРКЕР ДЛЯ ПЕРЕВІРКИ -->
<div style="background: #dc3545; color: white; padding: 10px; text-align: center; position: sticky; top: 70px; z-index: 999;">
    ⚠️ ЦЕ ТЕСТОВА СТОРІНКА ПОШУКУ! Якщо ви бачите цей текст — сторінка працює правильно.
</div>

<div class="container mt-5 pt-5">
    <div class="row">
        <div class="col-12">
            <h1 class="text-center mb-4">🔍 Пошук турів</h1>
            <p class="text-center text-muted mb-5">Знайдіть ідеальний тур за лічені хвилини</p>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div id="otpusk-search-module">
                <!-- КОД МОДУЛЯ ПОШУКУ ВІД OTPUSK.COM -->
                <script>
                    var osGeo = ''; /* Страна, курорт или отель по умолчанию в форме поиска */
                    var osDefaultDeparture = ''; /* ID города отправления (1544 для Киева) */
                    var osDefaultDuration = ''; /* Длительность тура в днях */
                    var osDateFrom = ''; /* Начало тура «от» */
                    var osDateTo = ''; /* Начало тура «до» */
                    var osHotelCategory = ''; /* Категория отеля */
                    var osFood = ''; /* Питание */
                    var osTransport = ''; /* Транспорт */
                    var osTarget = '/search-results/'; /* Страница для результатов поиска */
                    var osContainer = null; /* Элемент DIV для результатов */
                    var osTourContainer = null; /* Элемент DIV для тура */
                    var osLang = 'ua'; /* Язык интерфейса ru/ua */
                    var osTourTargetBlank = false; /* Открывать страницу тура в новом окне? */
                    var osOrderUrl = null; /* URL для формы заказа */
                    var osCurrency = 'converted'; /* Валюта: converted (гривна), original ($ или €) */
                    var osAutoStart = false; /* Автостарт поиска */
                </script>
                <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
                <script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
                <script src="https://export.otpusk.com/js/onsite/"></script>
                <script src="https://export.otpusk.com/js/order"></script>
            </div>
        </div>
    </div>
</div>

<style>
    #otpusk-search-module {
        min-height: 500px;
    }
    /* Додаткові стилі для кращого вигляду */
    .result-item {
        transition: all 0.3s ease;
    }
    .result-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    /* Адаптація для мобільних */
    @media (max-width: 768px) {
        .container {
            padding-left: 10px;
            padding-right: 10px;
        }
    }
</style>
{% endblock %}
