{% extends "base.html" %}
{% load static %}

{% block title %}Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4" style="color: #000000; text-align: left;">
                {% if geo %}Тури в {{ geo }}{% else %}Результати пошуку турів{% endif %}
            </h2>

            <!-- МОДУЛЬ ПОШУКУ OTPUSK -->
            <div id="otpusk-search-module">
                <script>
                    var osGeo = '{{ geo|default:"" }}';
                    var osDefaultDeparture = '{{ departure_text|default:"" }}';
                    var osDefaultDuration = '{{ duration|default:"7" }}';
                    var osDateFrom = '{{ date_from|default:"" }}';
                    var osDateTo = '{{ date_to|default:"" }}';
                    var osHotelCategory = '';
                    var osFood = '';
                    var osTransport = '';
                    var osTarget = '{% if agent_site %}/a/{{ agent_site.slug }}/search-otpusk-new/{% else %}/search-otpusk-new/{% endif %}';
                    var osContainer = null;
                    var osTourContainer = null;
                    var osLang = 'ua';
                    var osTourTargetBlank = false;
                    var osOrderUrl = null;
                    var osCurrency = 'converted';
                    var osAutoStart = {{ auto_search|default:"true"|lower }};
                </script>
                <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
                <script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
                <script src="https://export.otpusk.com/js/onsite/"></script>
                <script src="https://export.otpusk.com/js/order"></script>
            </div>
        </div>
    </div>
</div>

<!-- ========== ФІКС КНОПКИ "ПОШУК" ========== -->
<script>
(function() {
    function changeButton() {
        var btn = document.querySelector('.new_f-form-submit');
        if (btn && btn.textContent !== 'Пошук') {
            btn.textContent = 'Пошук';
            btn.style.whiteSpace = 'nowrap';
            btn.style.width = 'auto';
            btn.style.minWidth = '80px';
            btn.style.padding = '10px 24px';
            console.log('✅ Кнопка змінена на "Пошук"');
            return true;
        }
        return false;
    }

    changeButton();
    var observer = new MutationObserver(function() {
        if (changeButton()) observer.disconnect();
    });
    observer.observe(document.body, { childList: true, subtree: true });

    setTimeout(changeButton, 1000);
    setTimeout(changeButton, 2000);
    setTimeout(changeButton, 3000);
    setTimeout(changeButton, 5000);
})();
</script>

<style>
.new_f-form-submit {
    white-space: nowrap !important;
    width: auto !important;
    min-width: 80px !important;
    overflow: visible !important;
}
</style>

<!-- ========== АВТОМАТИЧНЕ ВСТАНОВЛЕННЯ ПАРАМЕТРІВ ========== -->
<script>
(function() {
    if (window.searchOtpuskSet) return;
    window.searchOtpuskSet = true;

    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
    const departureText = urlParams.get('departure_text') || '';
    const autoSearch = urlParams.get('auto_search') === '1';

    console.log('📥 Параметри:', { geo, departureText, autoSearch });

    let countrySelected = false;
    let searchTriggered = false;

    function selectCountry() {
        if (!geo || countrySelected) return;
        const input = document.querySelector('#location');
        if (input && input.value !== geo) {
            input.value = geo;
            input.dispatchEvent(new Event('input', { bubbles: true }));
            input.dispatchEvent(new Event('change', { bubbles: true }));
            countrySelected = true;
            console.log('✅ Країна:', geo);
        } else if (!input) {
            setTimeout(selectCountry, 300);
        }
    }

    function triggerSearch() {
        if (searchTriggered) return;
        if (autoSearch && countrySelected) {
            const btn = document.querySelector('.new_f-form-submit');
            if (btn) {
                btn.click();
                searchTriggered = true;
                console.log('🔍 Пошук запущено');
            }
        } else if (autoSearch && !countrySelected && geo) {
            setTimeout(triggerSearch, 500);
        }
    }

    setTimeout(selectCountry, 500);
    setTimeout(selectCountry, 1000);
    setTimeout(selectCountry, 1500);

    setTimeout(triggerSearch, 1500);
    setTimeout(triggerSearch, 2500);
    setTimeout(triggerSearch, 3500);
})();
</script>

<!-- ========== ПЕРЕХОПЛЕННЯ КЛІКІВ ========== -->
<script>
document.addEventListener('click', function(e) {
    var target = e.target.closest('.new_r-item a');
    if (!target) return;
    var url = target.href || '';
    if (!url || !url.includes('hid=')) return;
    e.preventDefault();
    var hid = url.match(/hid=(\d+)/)?.[1];
    var oid = url.match(/oid=([\d]+)/)?.[1];
    var od = url.match(/od=([\d-]+)/)?.[1];
    var ol = url.match(/ol=(\d+)/)?.[1];
    if (hid && oid) {
        var baseUrl = window.location.pathname.startsWith('/a/')
            ? '/a/' + window.location.pathname.split('/')[2] + '/tour-detail/'
            : '/tour-detail/';
        window.location.href = baseUrl + '?hid=' + hid + '&oid=' + oid + (od ? '&od=' + od : '') + (ol ? '&ol=' + ol : '');
    }
});
</script>

<!-- ========== СТИЛІ ========== -->
<style>
#otpusk-search-module {
    background: white !important;
    border-radius: 24px !important;
    border: 2px solid var(--primary-color) !important;
    padding: 20px 24px !important;
    width: 100% !important;

}

}

.new_r-item {

    flex-direction: row !important;

}

}

.new_r-item-price {

}

}

.new_r-currency-switch {
    display: flex !important;
    background: var(--primary-color) !important;
    border-radius: 30px !important;
    overflow: hidden !important;
    width: fit-content !important;
    float: right !important;
    margin-bottom: 15px !important;
}

.new_r-currency-switch span {
    color: white !important;
    padding: 6px 16px !important;
}

.new_r-item-rating-container {
    position: absolute !important;
    top: 12px !important;
    right: 12px !important;
    width: 65px !important;
    height: 65px !important;
    background: white !important;
    border-radius: 12px !important;
}

@media (max-width: 768px) {
    .new_r-item {
        flex-direction: column !important;
    }
    .new_r-item-img {
        width: 100% !important;
        height: 200px !important;
    }
    .new_r-item-price {
        margin-left: 0 !important;
        justify-content: center !important;
    }
    .new_r-currency-switch {
        float: none !important;
        margin: 0 auto 15px auto !important;
    }
}
</style>

{% endblock %}
