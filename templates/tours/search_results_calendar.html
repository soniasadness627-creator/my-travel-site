            <!-- МОДУЛЬ ПОШУКУ OTPUSK -->

                <script>
                    var osGeo = '';
                    var osDefaultDeparture = '';
                    var osDefaultDuration = '';
                    var osDateFrom = '';
                    var osDateTo = '';
                    var osHotelCategory = '';
                    var osFood = '';
                    var osTransport = '';

                </script>

            <!-- ========== ПРИМУСОВЕ ВСТАНОВЛЕННЯ ОДНАКОВИХ ДАТ ========== -->
            <script>
            (function() {
                if (window.calendarDateSet) return;
                window.calendarDateSet = true;

                const urlParams = new URLSearchParams(window.location.search);
                const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
                const departureText = urlParams.get('departure_text') || '';
                let dateFrom = urlParams.get('date_from') || '';
                let dateTo = urlParams.get('date_to') || '';

                if (dateFrom && (!dateTo || dateFrom !== dateTo)) {
                    dateTo = dateFrom;
                    console.log('📅 ПРИМУСОВО ВСТАНОВЛЮЄМО ОДНАКОВІ ДАТИ:', { dateFrom, dateTo });
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.set('date_to', dateTo);
                    window.history.replaceState({}, '', newUrl);
                }

                console.log('📥 Календар отримав:', { geo, departureText, dateFrom, dateTo });

                if (!dateFrom) return;

                const dayNum = dateFrom.split('.')[0];
                let step = 0;

                function setCalendarData() {
                    if (geo && step === 0) {
                        const input = document.querySelector('#location');
                        if (input && input.value !== geo) {
                            input.value = geo;
                            input.dispatchEvent(new Event('input', { bubbles: true }));
                            console.log('✅ Країна:', geo);
                        }
                        step = 1;
                        setTimeout(setCalendarData, 500);
                    }
                    else if (departureText && step === 1) {
                        const items = document.querySelectorAll('#new_os-from .new_f-dropdown-item');
                        for (let item of items) {
                            if (item.innerText.trim() === departureText) {
                                item.click();
                                console.log('✅ Місто:', departureText);
                                break;
                            }
                        }
                        step = 2;
                        setTimeout(setCalendarData, 800);
                    }
                    else if (step === 2) {
                        const startBtn = document.querySelector('.new_f-datepicker-wrap-1 button');
                        if (startBtn) { startBtn.click(); step = 3; setTimeout(setCalendarData, 200); }
                        else { step = 6; }
                    }
                    else if (step === 3) {
                        const cells = document.querySelectorAll('.ui-datepicker-calendar td a');
                        let clicked = false;
                        for (let cell of cells) {
                            if (cell.innerText === dayNum) {
                                cell.click(); clicked = true;
                                console.log('✅ Дата ПОЧАТКУ вибрана:', dateFrom);
                                step = 4; setTimeout(setCalendarData, 300);
                                break;
                            }
                        }
                        if (!clicked) step = 6;
                    }
                    else if (step === 4) {
                        const endBtn = document.querySelector('.new_f-datepicker-wrap-2 button');
                        if (endBtn) { endBtn.click(); step = 5; setTimeout(setCalendarData, 200); }
                        else { step = 6; }
                    }
                    else if (step === 5) {
                        const cells = document.querySelectorAll('.ui-datepicker-calendar td a');
                        for (let cell of cells) {
                            if (cell.innerText === dayNum) {
                                cell.click();
                                console.log('✅ Дата КІНЦЯ вибрана (ТАКА САМА):', dateTo);
                                break;
                            }
                        }
                        step = 6; setTimeout(setCalendarData, 200);
                    }
                    else if (step === 6) {
                        const closeBtn = document.querySelector('.ui-datepicker-close, .ui-datepicker-buttonpane button:first-child');
                        if (closeBtn) closeBtn.click();
                        step = 7; setTimeout(setCalendarData, 500);
                    }
                    else if (step === 7) {
                        const searchBtn = document.querySelector('.new_f-form-submit');
                        if (searchBtn) { searchBtn.click(); console.log('🔍 Пошук запущено!'); step = 8; }
                    }
                }

                setTimeout(setCalendarData, 1000);
                setTimeout(setCalendarData, 2000);
                setTimeout(setCalendarData, 3000);
                setTimeout(setCalendarData, 4000);
                setTimeout(setCalendarData, 5000);
            })();
            </script>

<!-- ========== ОРАНЖЕВЕ ПОПЕРЕДЖЕННЯ ДЛЯ ПІДТВЕРДЖЕННЯ КРАЇНИ ========== -->
<style>
.orange-warning {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #fff3e0;
    border-left: 5px solid #f59e0b;
    border-radius: 12px;
    padding: 14px 20px;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    z-index: 100000;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInRight 0.3s ease;
    cursor: pointer;
    max-width: 380px;
}
@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100px); }
    to { opacity: 1; transform: translateX(0); }
}
.orange-warning i { font-size: 20px; color: #f59e0b; }
.orange-warning span { font-size: 14px; color: #92400e; line-height: 1.4; }
.orange-warning .country-name { font-weight: 700; background: #fffbeb; padding: 3px 8px; border-radius: 20px; margin-left: 5px; display: inline-block; }
.orange-warning .close-warning { margin-left: auto; cursor: pointer; font-size: 18px; color: #92400e; opacity: 0.6; transition: opacity 0.2s; }
.orange-warning .close-warning:hover { opacity: 1; }
@media (max-width: 768px) {
    .orange-warning { bottom: 15px; right: 15px; left: 15px; max-width: none; padding: 12px 16px; }
    .orange-warning span { font-size: 12px; }
}
</style>

<script>
// ========== ОРАНЖЕВЕ ПОВІДОМЛЕННЯ ДЛЯ ПІДТВЕРДЖЕННЯ КРАЇНИ ==========
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
    if (!geo) return;
    const confirmedKey = 'country_confirmed_' + encodeURIComponent(geo) + '_calendar';
    const confirmed = localStorage.getItem(confirmedKey);
    if (confirmed === 'true') return;
    function isCountrySelected() {
        const countryInput = document.querySelector('#location');
        if (!countryInput) return false;
        const currentValue = countryInput.value;
        return currentValue && currentValue.toLowerCase().trim() === geo.toLowerCase().trim();
    }
    function isSearchStarted() {
        const resultsContainer = document.querySelector('.new_r-container');
        return resultsContainer && resultsContainer.children.length > 0;
    }
    function showWarning() {
        const existingWarning = document.querySelector('.orange-warning');
        if (existingWarning) existingWarning.remove();
        if (isCountrySelected() || isSearchStarted()) return;
        const warning = document.createElement('div');
        warning.className = 'orange-warning';
        warning.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><span>Підтвердіть країну <strong class="country-name">${geo}</strong> → натисніть на поле "Країна" або "Пошук"</span><div class="close-warning">✕</div>`;
        document.body.appendChild(warning);
        const closeBtn = warning.querySelector('.close-warning');
        if (closeBtn) closeBtn.addEventListener('click', function(e) { e.stopPropagation(); warning.remove(); });
        warning.addEventListener('click', function(e) {
            if (e.target.classList.contains('close-warning')) return;
            const countryInput = document.querySelector('#location');
            if (countryInput) {
                countryInput.style.transition = 'box-shadow 0.2s';
                countryInput.style.boxShadow = '0 0 0 3px #f59e0b';
                countryInput.focus();
                setTimeout(() => { countryInput.style.boxShadow = ''; }, 2000);
            }
            warning.remove();
        });
        setTimeout(() => { if (warning.parentNode) warning.remove(); }, 8000);
    }
    let warningShown = false;
    function checkAndShowWarning() {
        if (warningShown) return;
        if (isCountrySelected() || isSearchStarted()) return;
        showWarning();
        warningShown = true;
    }
    setTimeout(checkAndShowWarning, 2000);
    setTimeout(checkAndShowWarning, 4000);
    setTimeout(checkAndShowWarning, 6000);
    const observer = new MutationObserver(function() {
        if (isSearchStarted() && warningShown) {
            const warning = document.querySelector('.orange-warning');
            if (warning) warning.remove();
            observer.disconnect();
        }
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>

<script>
// Перехоплення кліків на тури
document.addEventListener('click', function(e) {
    let target = e.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
    if (!target) return;
    let url = target.href || '';
    if (!url && target.closest('.new_r-item')) {
        let link = target.closest('.new_r-item').querySelector('a');
        if (link) url = link.href;
    }
    if (!url || !url.includes('hid=')) return;
    e.preventDefault();
    let hid = url.match(/hid=(\d+)/)?.[1];
    let oid = url.match(/oid=([\d]+)/)?.[1];
    let od = url.match(/od=([\d-]+)/)?.[1];
    let ol = url.match(/ol=(\d+)/)?.[1];
    if (hid && oid) {
        let baseUrl = window.location.pathname.startsWith('/a/')
            ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
            : '/tour-detail/';
        window.location.href = `${baseUrl}?hid=${hid}&oid=${oid}&od=${od || ''}&ol=${ol || ''}`;
    }
});

// Фікс кнопки пошуку
(function() {
    function fixSearchButton() {
        const searchBtn = document.querySelector('.new_f-form-submit');
        if (searchBtn) {
            if (searchBtn.textContent === 'Знайти') searchBtn.textContent = 'Пошук';
            searchBtn.style.whiteSpace = 'nowrap';
            searchBtn.style.minWidth = '90px';
            searchBtn.style.width = 'auto';
        } else {
            setTimeout(fixSearchButton, 500);
        }
    }
    fixSearchButton();
    setTimeout(fixSearchButton, 1000);
    setTimeout(fixSearchButton, 2000);
})();

// Фікс перемикача валюти
(function() {
    function fixCurrency() {
        const el = document.querySelector('.new_r-currency-switch');
        if (el) { el.style.display = 'flex'; el.style.flexDirection = 'row'; }
        else { setTimeout(fixCurrency, 500); }
    }
    fixCurrency();
    setTimeout(fixCurrency, 1000);
})();
</script>
