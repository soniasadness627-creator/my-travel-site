                <script>
                    var osGeo = '';
                    var osDefaultDeparture = '';
                    var osDefaultDuration = '';

                    var osDateTo = '';
                    var osHotelCategory = '';
                    var osFood = '';
                    var osTransport = '';
                    var osTarget = '{% if agent_site %}/a/{{ agent_site.slug }}/search-results-calendar/{% else %}/search-results-calendar/{% endif %}';

            <!-- ========== СКРИПТ ДЛЯ ПРИМУСОВОГО ВСТАНОВЛЕННЯ ОДНАКОВИХ ДАТ ========== -->
<script>
(function() {
    if (window.calendarDateFixed) return;
    window.calendarDateFixed = true;

    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
    const departureText = urlParams.get('departure_text') || '';
    let dateFrom = urlParams.get('date_from') || '';
    let dateTo = urlParams.get('date_to') || '';
    const autoSearch = urlParams.get('auto_search') === '1';

    console.log('📥 Параметри:', { geo, departureText, dateFrom, dateTo, autoSearch });

    // Якщо немає дати - виходимо
    if (!dateFrom) return;

    // Робимо дати однаковими
    dateTo = dateFrom;

    let attempts = 0;
    let maxAttempts = 20;
    let countrySet = false;
    let departureSet = false;

    function splitDate(dateStr) {
        if (!dateStr) return { day: '', month: '', year: '' };
        const parts = dateStr.split('.');
        return { day: parts[0] || '', month: parts[1] || '', year: parts[2] || '' };
    }

    const fromDate = splitDate(dateFrom);
    const toDate = splitDate(dateTo);

    function applyDateToField(btn, day, month, year) {
        if (!btn) return false;

        // Змінюємо текст кнопки безпосередньо
        const daySpan = btn.querySelector('span');
        if (daySpan) {
            daySpan.textContent = day;
        }

        // Змінюємо повний текст
        const monthNames = ['січ', 'лют', 'бер', 'кві', 'тра', 'чер', 'лип', 'сер', 'вер', 'жов', 'лис', 'гру'];
        const monthName = monthNames[parseInt(month) - 1] || 'тра';
        btn.childNodes.forEach(node => {
            if (node.nodeType === 3 && node.textContent) {
                node.textContent = node.textContent.replace(/\d+/, day);
            }
        });

        // Якщо є місяць в тексті
        if (btn.innerHTML && monthName) {
            const monthsInText = ['січ', 'лют', 'бер', 'кві', 'тра', 'чер', 'лип', 'сер', 'вер', 'жов', 'лис', 'гру'];
            for (let m of monthsInText) {
                if (btn.innerHTML.includes(m)) {
                    btn.innerHTML = btn.innerHTML.replace(m, monthName);
                    break;
                }
            }
        }

        console.log(`📅 Встановлено дату: ${day} ${monthName}`);
        return true;
    }

    function trySetDates() {
        attempts++;
        console.log(`🔄 Спроба ${attempts}...`);

        // Встановлюємо КРАЇНУ
        if (geo && !countrySet) {
            const countryInput = document.querySelector('#location');
            if (countryInput && countryInput.value !== geo) {
                countryInput.value = geo;
                countryInput.dispatchEvent(new Event('input', { bubbles: true }));
                countryInput.dispatchEvent(new Event('change', { bubbles: true }));
                console.log('✅ Країна:', geo);
                countrySet = true;
            } else if (countryInput && countryInput.value === geo) {
                countrySet = true;
            }
        }

        // Встановлюємо МІСТО ВИЛЬОТУ
        if (departureText && !departureSet) {
            const departureBtn = document.querySelector('#new_os-from .new_f-dropdown-btn');
            if (departureBtn && !departureBtn.innerText.includes(departureText)) {
                departureBtn.click();
                setTimeout(() => {
                    const items = document.querySelectorAll('#new_os-from .new_f-dropdown-item');
                    for (let item of items) {
                        if (item.innerText.trim() === departureText) {
                            item.click();
                            departureSet = true;
                            console.log('✅ Місто вильоту:', departureText);
                            break;
                        }
                    }
                }, 200);
            } else if (departureBtn && departureBtn.innerText.includes(departureText)) {
                departureSet = true;
            }
        }

        // Встановлюємо ДАТУ ПОЧАТКУ
        const startBtn = document.querySelector('.new_f-datepicker-wrap-1 button');
        if (startBtn && fromDate.day) {
            applyDateToField(startBtn, fromDate.day, fromDate.month, fromDate.year);
        }

        // Встановлюємо ДАТУ КІНЦЯ (ТАКУ САМУ)
        const endBtn = document.querySelector('.new_f-datepicker-wrap-2 button');
        if (endBtn && toDate.day) {
            applyDateToField(endBtn, toDate.day, toDate.month, toDate.year);
        }

        // Якщо обидві дати встановлені та країна вибрана - запускаємо пошук
        if (autoSearch && countrySet && attempts > 3 && !window.searchStarted) {
            window.searchStarted = true;
            setTimeout(() => {
                const searchBtn = document.querySelector('.new_f-form-submit');
                if (searchBtn) {
                    searchBtn.click();
                    console.log('🔍 Пошук запущено з датами: початок=' + dateFrom + ', кінець=' + dateTo);
                }
            }, 1000);
        }

        // Повторюємо, поки не встановимо всі значення
        if (attempts < maxAttempts) {
            setTimeout(trySetDates, 800);
        }
    }

    // Запускаємо спроби
    setTimeout(trySetDates, 1000);
    setTimeout(trySetDates, 2000);
    setTimeout(trySetDates, 3000);
    setTimeout(trySetDates, 4000);
    setTimeout(trySetDates, 5000);
    setTimeout(trySetDates, 6000);
})();
</script>

<script>
// Перехоплення кліків на тури
document.addEventListener('click', function(e) {
    let target = e.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
    if (!target) return;
    let url = target.href || '';
    if (!url && target.closest('.new_r-item')) {
        let link = target.closest('.new_r-item').querySelector('a');
        if (link) url = link.href;
    }
    if (!url || !url.includes('hid=')) return;
    e.preventDefault();
    let hid = url.match(/hid=(\d+)/)?.[1];
    let oid = url.match(/oid=([\d]+)/)?.[1];
    let od = url.match(/od=([\d-]+)/)?.[1];
    let ol = url.match(/ol=(\d+)/)?.[1];
    if (hid && oid) {
        let baseUrl = window.location.pathname.startsWith('/a/')
            ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
            : '/tour-detail/';
        window.location.href = `${baseUrl}?hid=${hid}&oid=${oid}&od=${od || ''}&ol=${ol || ''}`;
    }
});

// Фікс кнопки пошуку
(function() {
    function fixSearchButton() {
        const searchBtn = document.querySelector('.new_f-form-submit');
        if (searchBtn && searchBtn.textContent === 'Знайти') {
            searchBtn.textContent = 'Пошук';
            searchBtn.style.whiteSpace = 'nowrap';
            searchBtn.style.minWidth = '90px';
            searchBtn.style.width = 'auto';
            console.log('✅ Кнопку змінено на "Пошук"');
        } else if (searchBtn) {
            setTimeout(fixSearchButton, 500);
        }
    }
    setTimeout(fixSearchButton, 1000);
    setTimeout(fixSearchButton, 2000);
})();
</script>

<style>
.orange-warning {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #fff3e0;
    border-left: 5px solid #f59e0b;
    border-radius: 12px;
    padding: 14px 20px;

    z-index: 100000;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInRight 0.3s ease;
    cursor: pointer;
}
@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100px); }
    to { opacity: 1; transform: translateX(0); }
}
.orange-warning i { font-size: 20px; color: #f59e0b; }
.orange-warning span { font-size: 14px; color: #92400e; }
.orange-warning .country-name { font-weight: 700; background: #fffbeb; padding: 3px 8px; border-radius: 20px; margin-left: 5px; }
</style>

<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';

    if (!geo) return;

    const confirmed = localStorage.getItem('country_confirmed_' + encodeURIComponent(geo));
    if (confirmed === 'true') return;

    function showWarning() {
        const existingWarning = document.querySelector('.orange-warning');
        if (existingWarning) existingWarning.remove();

        const warning = document.createElement('div');
        warning.className = 'orange-warning';
        warning.innerHTML = `
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Підтвердіть країну <strong class="country-name">${geo}</strong> → натисніть на поле "Країна" або "Пошук"</span>
        `;
        document.body.appendChild(warning);

        warning.addEventListener('click', function() {
            const countryInput = document.querySelector('#location');
            if (countryInput) {
                countryInput.style.transition = 'box-shadow 0.2s';
                countryInput.style.boxShadow = '0 0 0 3px #f59e0b';
                countryInput.focus();
                setTimeout(() => { countryInput.style.boxShadow = ''; }, 2000);
            }
            warning.remove();
        });

        setTimeout(() => {
            if (warning.parentNode) warning.remove();
        }, 7000);
    }

    setTimeout(showWarning, 1500);
})();
</script>
