{% extends "base.html" %}
{% load static %}

{% block title %}Пошук турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4 text-center">Пошук турів</h2>

            <div id="otpusk-search-module"></div>
        </div>
    </div>
</div>

<script>
// Отримуємо параметри з URL
const urlParams = new URLSearchParams(window.location.search);
const country = urlParams.get('country');
const departure = urlParams.get('departure');

console.log('========================================');
console.log('ПАРАМЕТРИ З URL:', { country, departure });
console.log('========================================');

// Налаштування для Otpusk
var osGeo = country ? decodeURIComponent(country) : '';
var osDefaultDeparture = departure ? decodeURIComponent(departure) : '';
var osDefaultDuration = '';
var osDateFrom = '';
var osDateTo = '';
var osHotelCategory = '';
var osFood = '';
var osTransport = '';
var osTarget = '{% if agent_site %}/a/{{ agent_site.slug }}/search-otpusk/{% else %}/search-otpusk/{% endif %}';
var osContainer = 'otpusk-search-module';
var osTourContainer = null;
var osLang = 'ua';
var osTourTargetBlank = false;
var osOrderUrl = null;
var osCurrency = 'converted';
var osAutoStart = true;  // ← АВТОМАТИЧНИЙ ПОШУК

console.log('📤 ВІДПРАВЛЯЄМО В OTPUSK:');
console.log('  osGeo:', osGeo);
console.log('  osDefaultDeparture:', osDefaultDeparture);
console.log('  osAutoStart:', osAutoStart);
</script>

<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
<script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
<script src="https://export.otpusk.com/js/onsite/"></script>
<script src="https://export.otpusk.com/js/order"></script>

<script>
// Додаткова перевірка після завантаження
setTimeout(function() {
    console.log('🔄 ПЕРЕВІРКА ПІСЛЯ ЗАВАНТАЖЕННЯ');
    const locationInput = document.querySelector('#location');
    if (locationInput && locationInput.value !== osGeo) {
        console.log('⚠️ Країна не встановлена, встановлюємо:', osGeo);
        locationInput.value = osGeo;
        locationInput.dispatchEvent(new Event('input', { bubbles: true }));
        locationInput.dispatchEvent(new Event('change', { bubbles: true }));
    }
}, 2000);
</script>

<style>
    #otpusk-search-module {
        background: white !important;
        border-radius: 24px !important;
        border: 2px solid var(--primary-color) !important;
        padding: 20px 24px !important;
        max-width: 1200px !important;
        margin: 0 auto !important;
    }
    .new_f-form-submit {
        background: var(--primary-color) !important;
        color: white !important;
    }
</style>
{% endblock %}
