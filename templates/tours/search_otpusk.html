{% extends "base.html" %}
{% load static %}

{% block title %}Пошук турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4 text-center">Пошук турів</h2>
            <div id="otpusk-search-module"></div>
        </div>
    </div>
</div>

<script>
// ============================================
// ОТРИМУЄМО ПАРАМЕТРИ З URL
// ============================================
const urlParams = new URLSearchParams(window.location.search);
let country = urlParams.get('country');
let fromCity = urlParams.get('from');

// Розкодовуємо
if (country) country = decodeURIComponent(country);
if (fromCity) fromCity = decodeURIComponent(fromCity);

console.log('📥 Отримані параметри:', { country, fromCity });

// Видаляємо "з " з міста вильоту
let cleanFromCity = fromCity ? fromCity.replace(/^з\s+/i, '').trim() : '';

window.otpuskCountry = country || '';
window.otpuskFromCity = cleanFromCity;
</script>

<!-- Підключаємо Otpusk -->
<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
<script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
<script src="https://export.otpusk.com/js/onsite/"></script>
<script src="https://export.otpusk.com/js/order"></script>

<script>
// НАЛАШТУВАННЯ OTPUSK - без ID, тільки текст
var osGeo = window.otpuskCountry;
var osDefaultDeparture = '';  // Порожнє, будемо встановлювати через клік
var osDefaultDuration = '';
var osDateFrom = '';
var osDateTo = '';
var osHotelCategory = '';
var osFood = '';
var osTransport = '';
var osTarget = window.location.pathname;
var osContainer = 'otpusk-search-module';
var osTourContainer = null;
var osLang = 'ua';
var osTourTargetBlank = false;
var osOrderUrl = null;
var osCurrency = 'converted';
var osAutoStart = false;  // Не автозапуск, дамо час на встановлення
</script>

<!-- ========== ГОЛОВНИЙ СКРИПТ ДЛЯ ВСТАНОВЛЕННЯ КРАЇНИ ТА МІСТА ========== -->
<script>
(function() {
    let attempts = 0;
    const maxAttempts = 30;
    let countrySet = false;
    let departureSet = false;
    let searchTriggered = false;

    const targetCountry = window.otpuskCountry;
    const targetCity = window.otpuskFromCity;

    console.log('🎯 Цільові значення:', { targetCountry, targetCity });

    function setCountry() {
        if (!targetCountry || countrySet) return false;

        const locationInput = document.querySelector('#location');
        if (!locationInput) return false;

        if (locationInput.value !== targetCountry) {
            locationInput.value = targetCountry;
            locationInput.dispatchEvent(new Event('input', { bubbles: true }));
            locationInput.dispatchEvent(new Event('change', { bubbles: true }));
            console.log(`✅ Встановлено країну: ${targetCountry}`);
        }

        // Намагаємось вибрати з автокомпліту
        setTimeout(() => {
            const items = document.querySelectorAll('#cntList .ui-menu-item, .ui-autocomplete li, .autocomplete-suggestion');
            for (let item of items) {
                const text = (item.innerText || item.textContent || '').toLowerCase().trim();
                if (text === targetCountry.toLowerCase().trim() || text.includes(targetCountry.toLowerCase())) {
                    const link = item.querySelector('a') || item;
                    link.click();
                    console.log(`✅ Вибрано країну зі списку: ${targetCountry}`);
                    break;
                }
            }
        }, 300);

        countrySet = true;
        return true;
    }

    function setDeparture() {
        if (!targetCity || departureSet) return false;

        console.log(`🛫 Шукаємо місто вильоту: "${targetCity}"`);

        // Шукаємо кнопку випадаючого списку
        const departureBtn = document.querySelector('.new_f-departure .new_f-dropdown-header, .new_f-from .new_f-dropdown-header, #new_os-from .new_f-dropdown-btn');
        if (!departureBtn) return false;

        // Відкриваємо список
        departureBtn.click();

        setTimeout(() => {
            const items = document.querySelectorAll('.new_f-departure .new_f-dropdown-item, .new_f-from .new_f-dropdown-item, #new_os-from .new_f-dropdown-item');
            let found = false;

            for (let item of items) {
                const itemText = (item.innerText || item.textContent || '').trim();
                const itemTextLower = itemText.toLowerCase();
                const targetCityLower = targetCity.toLowerCase();

                // Перевіряємо різні варіанти співпадіння
                if (itemTextLower === targetCityLower ||
                    itemTextLower.includes(targetCityLower) ||
                    targetCityLower.includes(itemTextLower)) {
                    item.click();
                    console.log(`✅ Вибрано місто вильоту: "${itemText}"`);
                    departureSet = true;
                    found = true;
                    break;
                }
            }

            if (!found) {
                // Закриваємо список
                departureBtn.click();
                console.log(`⚠️ Місто "${targetCity}" не знайдено у списку. Доступні міста:`,
                    Array.from(items).map(i => i.innerText).join(', '));
            }
        }, 300);

        return true;
    }

    function triggerSearch() {
        if (searchTriggered) return;

        // Чекаємо поки все встановиться
        const needCountry = targetCountry && !countrySet;
        const needDeparture = targetCity && !departureSet;

        if (!needCountry && !needDeparture) {
            setTimeout(() => {
                const searchBtn = document.querySelector('.new_f-form-submit');
                if (searchBtn) {
                    searchBtn.click();
                    searchTriggered = true;
                    console.log('🔍 ПОШУК ЗАПУЩЕНО!');
                }
            }, 500);
        }
    }

    function trySetValues() {
        attempts++;
        console.log(`🔄 Спроба ${attempts}/${maxAttempts}...`);

        setCountry();
        setDeparture();
        triggerSearch();

        if (attempts < maxAttempts && ((targetCountry && !countrySet) || (targetCity && !departureSet))) {
            setTimeout(trySetValues, 800);
        } else if (attempts >= maxAttempts) {
            console.log('⚠️ Час вийшов. Значення не встановлені.');
        }
    }

    // Запускаємо через 1 секунду
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => setTimeout(trySetValues, 1000));
    } else {
        setTimeout(trySetValues, 1000);
    }
})();
</script>

<style>
    #otpusk-search-module {
        background: white !important;
        border-radius: 24px !important;
        border: 2px solid var(--primary-color, #0d6efd) !important;
        padding: 20px 24px !important;
        max-width: 1200px !important;
        margin: 0 auto !important;
    }
    .new_f-form-submit {
        background: var(--primary-color, #0d6efd) !important;
        color: white !important;
        white-space: nowrap !important;
        padding: 10px 24px !important;
    }
    .new_f-form-submit:hover {
        background: var(--primary-dark, #0b5ed7) !important;
    }
</style>
{% endblock %}
