{% extends "base.html" %}
{% load static %}

{% block title %}Пошук турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4 text-center">Пошук турів</h2>

            <!-- ТУТ ВАШ МОДУЛЬ ПОШУКУ -->
            {% include "tours/otpusk_search.html" %}
        </div>
    </div>
</div>
<script>
(function() {
    // Отримуємо збережені параметри
    const savedCountry = localStorage.getItem('otpusk_search_country');
    const savedDeparture = localStorage.getItem('otpusk_search_departure');

    if (savedCountry || savedDeparture) {
        console.log('📥 Отримано збережені параметри:', { savedCountry, savedDeparture });

        // Очищаємо localStorage після використання
        localStorage.removeItem('otpusk_search_country');
        localStorage.removeItem('otpusk_search_departure');

        let attempts = 0;
        let countrySet = false;
        let departureSet = false;

        function setValues() {
            attempts++;
            console.log(`🔄 Спроба ${attempts} встановлення параметрів...`);

            // Встановлюємо КРАЇНУ
            if (savedCountry && !countrySet) {
                const countryInput = document.querySelector('#location');
                if (countryInput) {
                    countryInput.value = savedCountry;
                    countryInput.dispatchEvent(new Event('input', { bubbles: true }));
                    countryInput.dispatchEvent(new Event('change', { bubbles: true }));
                    countrySet = true;
                    console.log('✅ Встановлено країну:', savedCountry);
                }
            }

            // Встановлюємо МІСТО ВИЛЬОТУ
            if (savedDeparture && !departureSet) {
                // Шукаємо кнопку вибору міста вильоту
                const departureBtn = document.querySelector('#new_os-from .new_f-dropdown-btn');
                if (departureBtn) {
                    departureBtn.click();
                    setTimeout(() => {
                        const items = document.querySelectorAll('#new_os-from .new_f-dropdown-item');
                        for (let item of items) {
                            const itemText = item.innerText.trim();
                            if (itemText === savedDeparture ||
                                itemText === savedDeparture.replace('з ', '') ||
                                itemText.toLowerCase() === savedDeparture.toLowerCase()) {
                                item.click();
                                departureSet = true;
                                console.log('✅ Встановлено місто вильоту:', savedDeparture);
                                break;
                            }
                        }
                    }, 300);
                }
            }

            // Запускаємо пошук після того, як все встановлено
            if (countrySet && attempts >= 3) {
                setTimeout(() => {
                    const searchBtn = document.querySelector('.new_f-form-submit');
                    if (searchBtn) {
                        searchBtn.click();
                        console.log('🔍 Пошук запущено!');
                    }
                }, 500);
            } else if (countrySet && attempts < 10) {
                setTimeout(setValues, 800);
            } else if (!countrySet && attempts < 10) {
                setTimeout(setValues, 800);
            }
        }

        // Запускаємо з різними затримками
        setTimeout(setValues, 500);
        setTimeout(setValues, 1200);
        setTimeout(setValues, 2000);
        setTimeout(setValues, 3000);
        setTimeout(setValues, 4000);
    }
})();
</script>
<!-- ФІКС КНОПКИ -->
<script src="{% static 'js/fix_otpusk_button.js' %}"></script>
{% endblock %}
