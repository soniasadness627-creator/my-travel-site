{% extends "base.html" %}
{% load static %}

{% block title %}Пошук турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4 text-center">Пошук турів</h2>
            <div id="otpusk-search-module"></div>
        </div>
    </div>
</div>

<script>
// ============================================
// 1. МАПА МІСТ (назва -> ID)
// ============================================
const departureCityMap = {
    'кишинів': 1200, 'кишинев': 1200, 'chisinau': 1200,
    'київ': 1544, 'киев': 1544, 'kyiv': 1544, 'kiev': 1544,
    'одеса': 1545, 'одесса': 1545, 'odessa': 1545,
    'львів': 1546, 'львов': 1546, 'lviv': 1546, 'lviv': 1546,
    'варшава': 1676, 'warsaw': 1676,
    'краків': 1677, 'krakow': 1677,
    'бухарест': 1653, 'bucharest': 1653,
    'прага': 1682, 'prague': 1682,
    'берлін': 1636, 'berlin': 1636,
    'будапешт': 1651, 'budapest': 1651
};

// ============================================
// 2. ОТРИМУЄМО ПАРАМЕТРИ З URL
// ============================================
const urlParams = new URLSearchParams(window.location.search);
let countryFromUrl = urlParams.get('country');
let departureFromUrl = urlParams.get('departure_name');

// Розкодовуємо та нормалізуємо
if (countryFromUrl) countryFromUrl = decodeURIComponent(countryFromUrl);
if (departureFromUrl) departureFromUrl = decodeURIComponent(departureFromUrl);

// Визначаємо ID міста вильоту
let departureId = 1200; // Кишинів за замовчуванням
if (departureFromUrl) {
    const key = departureFromUrl.toLowerCase();
    if (departureCityMap[key]) {
        departureId = departureCityMap[key];
    }
}

console.log('🔍 ПАРАМЕТРИ:', { countryFromUrl, departureFromUrl, departureId });

// ============================================
// 3. НАЛАШТУВАННЯ ДЛЯ OTPUSK
// ============================================
var osGeo = countryFromUrl || '';
var osDefaultDeparture = departureId;
var osDefaultDuration = '';
var osDateFrom = '';
var osDateTo = '';
var osHotelCategory = '';
var osFood = '';
var osTransport = '';
var osTarget = window.location.pathname;
var osContainer = 'otpusk-search-module';
var osTourContainer = null;
var osLang = 'ua';
var osTourTargetBlank = false;
var osOrderUrl = null;
var osCurrency = 'converted';
var osAutoStart = true;
</script>

<!-- Підключення скриптів Otpusk -->
<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
<script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
<script src="https://export.otpusk.com/js/onsite/"></script>
<script src="https://export.otpusk.com/js/order"></script>

<!--
    ============================================
    4. ГОЛОВНИЙ МЕХАНІЗМ - повторні спроби встановити значення
    ============================================
-->
<script>
(function() {
    let attempts = 0;
    const maxAttempts = 30; // 30 спроб * 500ms = 15 секунд
    let countrySet = false;
    let departureSet = false;

    function setValues() {
        attempts++;

        // ВСТАНОВЛЕННЯ КРАЇНИ
        if (!countrySet && osGeo && osGeo.length > 0) {
            const locationInput = document.querySelector('#location');
            if (locationInput && locationInput.value !== osGeo) {
                locationInput.value = osGeo;
                locationInput.dispatchEvent(new Event('input', { bubbles: true }));
                locationInput.dispatchEvent(new Event('change', { bubbles: true }));
                console.log(`✅ [Спроба ${attempts}] Встановлено країну: ${osGeo}`);
                countrySet = true;
            }
        }

        // ВСТАНОВЛЕННЯ МІСТА ВИЛЬОТУ - через клік по елементу з data-id
        if (!departureSet && departureId) {
            // Шукаємо випадаючий список міст
            const departureBtn = document.querySelector('.new_f-departure .new_f-dropdown-header');
            if (departureBtn) {
                // Відкриваємо випадаючий список
                departureBtn.click();

                // Шукаємо потрібне місто
                setTimeout(() => {
                    const targetItem = document.querySelector(`.new_f-departure .new_f-dropdown-item[data-id="${departureId}"]`);
                    if (targetItem) {
                        targetItem.click();
                        console.log(`✅ [Спроба ${attempts}] Встановлено місто вильоту ID: ${departureId}`);
                        departureSet = true;
                    } else {
                        // Якщо не знайшли по data-id, пробуємо по тексту
                        const items = document.querySelectorAll('.new_f-departure .new_f-dropdown-item');
                        for (let item of items) {
                            if (item.textContent.trim().toLowerCase() === (departureFromUrl || '').toLowerCase()) {
                                item.click();
                                console.log(`✅ [Спроба ${attempts}] Встановлено місто вильоту (по тексту): ${departureFromUrl}`);
                                departureSet = true;
                                break;
                            }
                        }
                        // Закриваємо список якщо не вибрали
                        if (!departureSet) {
                            departureBtn.click();
                        }
                    }
                }, 100);
            }
        }

        // Якщо обидва встановлені - запускаємо пошук
        if (countrySet && departureSet) {
            console.log('🚀 ВСЕ ВСТАНОВЛЕНО! Шукаємо кнопку пошуку...');
            setTimeout(() => {
                const submitBtn = document.querySelector('.new_f-form-submit');
                if (submitBtn) {
                    submitBtn.click();
                    console.log('🔍 ПОШУК ЗАПУЩЕНО!');
                }
            }, 300);
            return;
        }

        // Якщо ще не все встановлено і не перевищили спроби - пробуємо знову
        if (attempts < maxAttempts && (!countrySet || !departureSet)) {
            setTimeout(setValues, 500);
        } else if (attempts >= maxAttempts) {
            console.warn('⚠️ Час вийшов. Значення не встановлені.');
        }
    }

    // Запускаємо після завантаження DOM
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setValues);
    } else {
        setValues();
    }
})();
</script>

<style>
    #otpusk-search-module {
        background: white !important;
        border-radius: 24px !important;
        border: 2px solid var(--primary-color, #0d6efd) !important;
        padding: 20px 24px !important;
        max-width: 1200px !important;
        margin: 0 auto !important;
    }
    .new_f-form-submit {
        background: var(--primary-color, #0d6efd) !important;
        color: white !important;
    }
    .new_f-form-submit:hover {
        background: var(--primary-dark, #0b5ed7) !important;
    }
</style>
{% endblock %}
