{% extends "base.html" %}
{% load static %}

{% block title %}Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4" style="color: #000000; text-align: left;">Результати пошуку турів</h2>

            <!-- МОДУЛЬ ПОШУКУ OTPUSK -->
            <div id="otpusk-search-module">
                <script>
                    var osGeo = '';
                    var osDefaultDeparture = '';
                    var osDefaultDuration = '';
                    var osDateFrom = '';
                    var osDateTo = '';
                    var osHotelCategory = '';
                    var osFood = '';
                    var osTransport = '';
                    var osTarget = '{% if agent_site %}/a/{{ agent_site.slug }}/search-otpusk/{% else %}/search-otpusk/{% endif %}';
                    var osContainer = null;
                    var osTourContainer = null;
                    var osLang = 'ua';
                    var osTourTargetBlank = false;
                    var osOrderUrl = null;
                    var osCurrency = 'converted';
                    var osAutoStart = false;
                </script>
                <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
                <script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
                <script src="https://export.otpusk.com/js/onsite/"></script>
                <script src="https://export.otpusk.com/js/order"></script>
            </div>

            <!-- ========== СКРИПТ ДЛЯ АВТОМАТИЧНОГО ВСТАНОВЛЕННЯ ПАРАМЕТРІВ ========== -->
            <script>
            (function() {
                if (window.searchOtpuskDateSet) return;
                window.searchOtpuskDateSet = true;

                const urlParams = new URLSearchParams(window.location.search);
                const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
                const departureText = urlParams.get('departure_text') || '';
                let dateFrom = urlParams.get('date_from') || '';
                let dateTo = urlParams.get('date_to') || '';
                const duration = urlParams.get('duration') || '';
                const autoSearch = urlParams.get('auto_search') === '1';

                console.log('📥 Пошук отримав параметри:', { geo, departureText, dateFrom, dateTo, duration, autoSearch });

                let step = 0;
                let searchTriggered = false;
                let countrySelected = false;
                let departureSelected = false;

                function setFormValues() {
                    // Крок 0: Вибір країни
                    if (geo && step === 0 && !countrySelected) {
                        const input = document.querySelector('#location');
                        if (input && input.value !== geo) {
                            input.value = geo;
                            input.dispatchEvent(new Event('input', { bubbles: true }));
                            input.dispatchEvent(new Event('change', { bubbles: true }));
                            console.log('✅ Країна:', geo);
                            countrySelected = true;
                        }
                        step = 1;
                        setTimeout(setFormValues, 500);
                    }
                    // Крок 1: Вибір міста вильоту
                    else if (departureText && step === 1 && !departureSelected) {
                        const items = document.querySelectorAll('#new_os-from .new_f-dropdown-item');
                        let found = false;
                        for (let item of items) {
                            if (item.innerText.trim() === departureText) {
                                item.click();
                                found = true;
                                departureSelected = true;
                                console.log('✅ Місто вильоту:', departureText);
                                break;
                            }
                        }
                        step = 2;
                        setTimeout(setFormValues, 500);
                    }
                    // Крок 2: Вибір дати ПОЧАТКУ (якщо є)
                    else if (dateFrom && step === 2) {
                        const dayNum = dateFrom.split('.')[0];
                        const startBtn = document.querySelector('.new_f-datepicker-wrap-1 button');
                        if (startBtn) {
                            startBtn.click();
                            setTimeout(() => {
                                const cells = document.querySelectorAll('.ui-datepicker-calendar td a');
                                for (let cell of cells) {
                                    if (cell.innerText === dayNum) {
                                        cell.click();
                                        console.log('✅ Дата ПОЧАТКУ:', dateFrom);
                                        break;
                                    }
                                }
                                step = 3;
                                setTimeout(setFormValues, 300);
                            }, 200);
                        } else {
                            step = 4;
                        }
                    }
                    // Крок 3: Вибір дати КІНЦЯ (якщо є)
                    else if (dateTo && step === 3) {
                        const dayNum = dateTo.split('.')[0];
                        const endBtn = document.querySelector('.new_f-datepicker-wrap-2 button');
                        if (endBtn) {
                            endBtn.click();
                            setTimeout(() => {
                                const cells = document.querySelectorAll('.ui-datepicker-calendar td a');
                                for (let cell of cells) {
                                    if (cell.innerText === dayNum) {
                                        cell.click();
                                        console.log('✅ Дата КІНЦЯ:', dateTo);
                                        break;
                                    }
                                }
                                setTimeout(() => {
                                    const closeBtn = document.querySelector('.ui-datepicker-close, .ui-datepicker-buttonpane button:first-child');
                                    if (closeBtn) closeBtn.click();
                                }, 100);
                                step = 4;
                                setTimeout(setFormValues, 500);
                            }, 200);
                        } else {
                            step = 4;
                        }
                    }
                    // Крок 4: Запуск пошуку
                    else if (step === 4 && !searchTriggered && autoSearch) {
                        const searchBtn = document.querySelector('.new_f-form-submit');
                        if (searchBtn) {
                            searchBtn.click();
                            searchTriggered = true;
                            console.log('🔍 Пошук запущено!');
                        }
                    }
                }

                setTimeout(setFormValues, 1000);
                setTimeout(setFormValues, 2000);
                setTimeout(setFormValues, 3000);
                setTimeout(setFormValues, 4000);
            })();
            </script>
        </div>
    </div>
</div>

<script>
// Перехоплення кліків на тури
document.addEventListener('click', function(e) {
    let target = e.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
    if (!target) return;
    let url = target.href || '';
    if (!url && target.closest('.new_r-item')) {
        let link = target.closest('.new_r-item').querySelector('a');
        if (link) url = link.href;
    }
    if (!url || !url.includes('hid=')) return;
    e.preventDefault();
    let hid = url.match(/hid=(\d+)/)?.[1];
    let oid = url.match(/oid=([\d]+)/)?.[1];
    let od = url.match(/od=([\d-]+)/)?.[1];
    let ol = url.match(/ol=(\d+)/)?.[1];
    if (hid && oid) {
        let baseUrl = window.location.pathname.startsWith('/a/')
            ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
            : '/tour-detail/';
        window.location.href = `${baseUrl}?hid=${hid}&oid=${oid}&od=${od || ''}&ol=${ol || ''}`;
    }
});

// Фікс кнопки пошуку
(function() {
    function fixSearchButton() {
        const searchBtn = document.querySelector('.new_f-form-submit');
        if (searchBtn && searchBtn.textContent === 'Знайти') {
            searchBtn.textContent = 'Пошук';
            searchBtn.style.whiteSpace = 'nowrap';
            searchBtn.style.minWidth = '90px';
            searchBtn.style.width = 'auto';
            console.log('✅ Кнопку змінено на "Пошук"');
        } else if (searchBtn) {
            setTimeout(fixSearchButton, 500);
        }
    }
    setTimeout(fixSearchButton, 1000);
    setTimeout(fixSearchButton, 2000);
})();
</script>
