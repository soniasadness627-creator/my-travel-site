{% extends "base.html" %}
{% load static %}

{% block title %}Пошук турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4 text-center">Пошук турів</h2>

            <!-- ТУТ ВАШ МОДУЛЬ ПОШУКУ -->
            {% include "tours/otpusk_search.html" %}
        </div>
    </div>
</div>
<script>
(function() {
    // Отримуємо параметри з хеша
    const hash = window.location.hash;
    console.log('🔍 Хеш URL:', hash);

    if (hash && hash.includes('geo')) {
        // Парсимо параметри з хеша
        const params = {};
        hash.replace(/^#!?/, '').split('&').forEach(param => {
            const [key, value] = param.split('=');
            if (key && value) {
                params[key] = decodeURIComponent(value);
            }
        });

        console.log('📥 Отримано параметри:', params);

        let attempts = 0;
        let countrySet = false;

        function setValues() {
            attempts++;
            console.log(`🔄 Спроба ${attempts}...`);

            // Встановлюємо КРАЇНУ
            if (params.geo && !countrySet) {
                const countryInput = document.querySelector('#location');
                if (countryInput) {
                    countryInput.value = params.geo;
                    countryInput.dispatchEvent(new Event('input', { bubbles: true }));
                    countryInput.dispatchEvent(new Event('change', { bubbles: true }));
                    countrySet = true;
                    console.log('✅ Встановлено країну:', params.geo);
                } else {
                    console.log('❌ Поле #location не знайдено');
                }
            }

            // Встановлюємо МІСТО ВИЛЬОТУ
            if (params.departure_text) {
                setTimeout(() => {
                    const departureBtn = document.querySelector('#new_os-from .new_f-dropdown-btn');
                    if (departureBtn) {
                        departureBtn.click();
                        setTimeout(() => {
                            const items = document.querySelectorAll('#new_os-from .new_f-dropdown-item');
                            for (let item of items) {
                                const itemText = item.innerText.trim();
                                if (itemText === params.departure_text ||
                                    itemText === params.departure_text.replace('з ', '')) {
                                    item.click();
                                    console.log('✅ Встановлено місто вильоту:', params.departure_text);
                                    break;
                                }
                            }
                        }, 200);
                    }
                }, 400);
            }

            // Запускаємо пошук
            if (countrySet && params.auto_search === '1') {
                setTimeout(() => {
                    const searchBtn = document.querySelector('.new_f-form-submit');
                    if (searchBtn) {
                        searchBtn.click();
                        console.log('🔍 Пошук запущено!');
                    }
                }, 600);
            }

            if (attempts < 10 && !countrySet) {
                setTimeout(setValues, 500);
            }
        }

        // Запускаємо багаторазово
        setTimeout(setValues, 500);
        setTimeout(setValues, 1000);
        setTimeout(setValues, 1500);
        setTimeout(setValues, 2000);
        setTimeout(setValues, 3000);
    }
})();
</script>
<!-- ФІКС КНОПКИ -->
<script src="{% static 'js/fix_otpusk_button.js' %}"></script>
{% endblock %}
