<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Tour Module</title>

<style>
body {
    font-family: 'Open Sans', sans-serif;
    background: #f7f7f7;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 6px;
    max-width: 500px;
}

.block {
    margin-bottom: 15px;
}

.title {
    font-weight: bold;
    margin-bottom: 5px;
}

.value {
    color: #333;
}

.btn {
    display: inline-block;
    margin-top: 5px;
    color: #7a219e;
    cursor: pointer;
}

.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background:white;
    padding:20px;
    border-radius:6px;
    min-width:250px;
}

.close {
    float:right;
    cursor:pointer;
    font-size:20px;
}
</style>

</head>
<body>

<div class="container">

    <div class="block">
        <div class="title">Туристи</div>
        <div class="value" id="peopleValue">2 дорослих</div>
        <div class="btn" onclick="openModal('peopleModal')">Змінити</div>
    </div>

    <div class="block">
        <div class="title">Дата</div>
        <div class="value" id="dateValue">21 травня - 7 ночей</div>
        <div class="btn" onclick="openModal('dateModal')">Змінити</div>
    </div>

    <div class="block">
        <div class="title">Харчування</div>
        <div class="value" id="foodValue">Все включено</div>
        <div class="btn" onclick="openModal('foodModal')">Змінити</div>
    </div>

    <div class="block">
        <div class="title">Ціна</div>
        <div class="value">47 994 грн</div>
    </div>

</div>

<!-- PEOPLE MODAL -->
<div class="modal" id="peopleModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('peopleModal')">×</span>
        <h3>Кількість дорослих</h3>

        <button onclick="setPeople(1)">1</button>
        <button onclick="setPeople(2)">2</button>
        <button onclick="setPeople(3)">3</button>
        <button onclick="setPeople(4)">4</button>

    </div>
</div>

<!-- DATE MODAL -->
<div class="modal" id="dateModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('dateModal')">×</span>
        <h3>Дата</h3>

        <button onclick="setDate('21 травня - 7 ночей')">21 травня</button>
        <button onclick="setDate('25 травня - 10 ночей')">25 травня</button>

    </div>
</div>

<!-- FOOD MODAL -->
<div class="modal" id="foodModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('foodModal')">×</span>
        <h3>Харчування</h3>

        <button onclick="setFood('Все включено')">AI</button>
        <button onclick="setFood('Сніданок')">BB</button>

    </div>
</div>

<script>

function openModal(id){
    document.getElementById(id).style.display = "flex";
}

function closeModal(id){
    document.getElementById(id).style.display = "none";
}

function setPeople(n){
    document.getElementById("peopleValue").innerText = n + " дорослих";
    closeModal("peopleModal");
}

function setDate(text){
    document.getElementById("dateValue").innerText = text;
    closeModal("dateModal");
}

function setFood(text){
    document.getElementById("foodValue").innerText = text;
    closeModal("foodModal");
}

</script>

</body>
</html>
