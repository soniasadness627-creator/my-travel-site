{% extends "base.html" %}
{% load static %}

{% block title %}Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="text-center mb-4" style="color: var(--primary-color);">Результати пошуку турів</h2>
            <div id="otpusk-search-module">
                <script>
                    var osGeo = '';
                    var osDefaultDeparture = '';
                    var osDefaultDuration = '';
                    var osDateFrom = '';
                    var osDateTo = '';
                    var osHotelCategory = '';
                    var osFood = '';
                    var osTransport = '';
                    var osTarget = '';
                    var osContainer = null;
                    var osTourContainer = null;
                    var osLang = 'ua';
                    var osTourTargetBlank = false;
                    var osOrderUrl = null;
                    var osCurrency = 'converted';
                    var osAutoStart = false;
                </script>
                <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
                <script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
                <script src="https://export.otpusk.com/js/onsite/"></script>
                <script src="https://export.otpusk.com/js/order"></script>
            </div>
        </div>
    </div>
</div>

<style>
/* ========== ОСНОВНІ СТИЛІ ========== */

/* Контейнер модуля */
#otpusk-search-module {
    background: white !important;
    border-radius: 24px !important;
    border: 2px solid var(--primary-color) !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05) !important;
    padding: 20px 24px !important;
    width: 100% !important;
    margin: 0 auto !important;
    position: relative !important;
    z-index: 10 !important;
}

/* Кнопка "Знайти" */
.new_f-form-submit {
    background: var(--primary-color) !important;
    color: white !important;
    border-radius: 10px !important;
    border: none !important;
    font-weight: 600 !important;
    padding: 12px 28px !important;
    transition: all 0.3s ease !important;
    cursor: pointer !important;
}

.new_f-form-submit:hover {
    background: var(--primary-dark) !important;
}

/* ========== ЦІНА - ТІЛЬКИ ЦИФРА ЧЕРВОНА ========== */

/* Цифра ціни - ЧЕРВОНА */
.new_price-value {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    color: #dc2626 !important;
    font-weight: 700 !important;
    font-size: 1.25rem !important;
}

/* Весь блок ціни - залишаємо чорним для іншого тексту */
span.new_r-item-price,
.new_r-item-price {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    color: #1a202c !important;
    font-weight: 500 !important;
    font-size: 1rem !important;
}

/* ========== ВАЛЮТА (грн/$) В ЦІНІ - ЧОРНА, БЕЗ ФОНУ ========== */

/* Валюта біля ціни - чорний текст, без фону */
.currency,
.new_r-item-price .currency,
span.currency {
    background: transparent !important;
    color: #1a202c !important;
    padding: 0 !important;
    border-radius: 0 !important;
    display: inline !important;
    font-weight: 600 !important;
    font-size: 1rem !important;
}

/* ========== КНОПКИ ПЕРЕМИКАННЯ ВАЛЮТИ - ЦІЛІСНИЙ БЛОК В РЯД ========== */

/* Контейнер кнопок валюти */
.new_r-currency-switch {
    display: flex !important;
    flex-direction: row !important;
    gap: 0 !important;
    background: var(--primary-color) !important;
    border-radius: 24px !important;
    overflow: hidden !important;
    width: fit-content !important;
    flex-wrap: nowrap !important;
}

/* Стиль для обгортки label */
.new_r-currency-switch label {
    margin: 0 !important;
    display: inline-block !important;
    flex-shrink: 0 !important;
}

/* Ховаємо радіо кнопки */
.new_r-currency-switch input[type="radio"] {
    display: none !important;
}

/* Стиль для span (грн та $) - кольоровий блок ТІЛЬКИ В ПЕРЕМИКАЧІ */
.new_r-currency-switch span {
    background: transparent !important;
    color: white !important;
    padding: 6px 16px !important;
    display: inline-block !important;
    font-weight: 600 !important;
    font-size: 0.9rem !important;
    cursor: pointer !important;
    transition: all 0.2s ease !important;
    margin: 0 !important;
    border-radius: 0 !important;
    white-space: nowrap !important;
}

/* Активна валюта (вибрана) */
.new_r-currency-switch input[type="radio"]:checked + span,
.new_r-currency-switch span.active {
    background: rgba(255, 255, 255, 0.25) !important;
    color: white !important;
}

/* Ховер ефект */
.new_r-currency-switch span:hover {
    background: rgba(255, 255, 255, 0.15) !important;
}

/* ========== ЗІРКИ - ЖОВТІ ========== */
.new_r-item-star {
    fill: #FFD700 !important;
}

/* ========== ТРАНСПОРТ - КОЛІР АГЕНТА ========== */
span.new_r-filter-value,
.new_r-filter-value {
    color: var(--primary-color) !important;
    font-weight: 500 !important;
}

/* ========== КНОПКИ ========== */
.new_r-detail-btn {
    background: var(--primary-color) !important;
    color: white !important;
    border: none !important;
    border-radius: 40px !important;
    padding: 8px 20px !important;
}

.new_r-detail-btn:hover {
    background: var(--primary-dark) !important;
}

.new_f-dropdown-bottom-btn.new_f-dropdown-btn-apply {
    background: var(--primary-color) !important;
    color: white !important;
    border: none !important;
    border-radius: 40px !important;
    padding: 10px !important;
}

.new_f-ext-clear-btn {
    background: #e2e8f0 !important;
    color: #1a202c !important;
    border: none !important;
    border-radius: 40px !important;
    padding: 10px !important;
}

/* ========== ФІЛЬТРИ ========== */
.new_f-ext-container {
    display: block !important;
    background: #f8f9fa !important;
    border-radius: 16px !important;
    padding: 20px !important;
    border: 1px solid #e2e8f0 !important;
}

.new_f-ext-btn,
.new_f-dropdown-body-top {
    display: none !important;
}

.new_f-ext-bl-body label:hover {
    border-color: var(--primary-color) !important;
}

.new_f-dropdown-item.selected {
    background: var(--primary-color) !important;
    color: white !important;
}

/* ========== КАРТКА ТУРУ ========== */
.new_r-item {
    background: white !important;
    border-radius: 16px !important;
    border: 1px solid #e2e8f0 !important;
    margin-bottom: 20px !important;
    overflow: hidden !important;
}

.new_r-item:hover {
    border-color: var(--primary-color) !important;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1) !important;
}

/* ========== РЕЙТИНГ - ПРЯМОКУТНИЙ, З КОЛЬОРОМ ЯК БУВ У КРУГУ ========== */

/* Контейнер рейтингу - прямокутний, без кольору агента */
.new_r-item-rating-container,
.new_r-p8 {
    background: #f0f0f0 !important;
    border-radius: 6px !important;
    width: 130px !important;
    height: 30px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    padding: 0 12px !important;
    position: relative !important;
    box-sizing: border-box !important;
    border: 1px solid #e0e0e0 !important;
}

/* Колір фону для рейтингу - ТОЙ САМИЙ ЩО БІЛЯ КРУГА (оранжевий/золотий) */
.new_r-item-rating-value {
    font-weight: 700 !important;
    color: #f7941d !important;  /* Колір як був у круга */
    font-size: 0.9rem !important;
    background: transparent !important;
    margin: 0 !important;
}

/* Текст "оцінок" та кількість - сірі */
.new_r-item-rating-rev {
    display: flex !important;
    align-items: center !important;
    gap: 3px !important;
    font-size: 0.7rem !important;
    color: #666 !important;
    background: transparent !important;
}

.new_r-item-rating-rev span {
    font-weight: 600 !important;
    color: #666 !important;
}

/* ХОВАЄМО ВСІ КРУГЛІ ЕЛЕМЕНТИ ТА СМУГИ */
.new_r-item-rating-container::before {
    display: none !important;
}

.new_r-item-rating-container .slice,
.new_r-item-rating-container .bar,
.new_r-item-rating-container .fill,
.new_r-item-rating-container svg,
.new_r-item-rating-container circle,
.new_r-item-rating-container path {
    display: none !important;
}

.new_r-item-rating-container::after {
    display: none !important;
}

/* ========== МОБІЛЬНА ВЕРСІЯ ========== */
@media (max-width: 768px) {
    #otpusk-search-module {
        padding: 15px !important;
        margin: 0 15px !important;
        width: auto !important;
    }

    .new_f-dropdown-btn {
        width: 100% !important;
        padding: 10px 14px !important;
    }

    .new_f-form-submit {
        width: 100% !important;
        margin-top: 10px !important;
    }
}

/* Додатковий фікс - текст "за двох" залишається чорним */
.new_price-desc {
    color: #1a202c !important;
    font-weight: normal !important;
}
</style>

<script>
// Заміна євро на долар
document.addEventListener('DOMContentLoaded', function() {
    function replaceEuroToDollar() {
        const euroElements = document.querySelectorAll('[data-cur="€"], span[data-cur="€"]');
        euroElements.forEach(function(el) {
            el.setAttribute('data-cur', '$');
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });

        const textElements = document.querySelectorAll('.new_r-currency-switch span');
        textElements.forEach(function(el) {
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });
    }

    replaceEuroToDollar();

    const observer = new MutationObserver(function() {
        replaceEuroToDollar();
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
});
</script>
{% endblock %}
