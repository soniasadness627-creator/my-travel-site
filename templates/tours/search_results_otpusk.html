<script>
// Заміна євро на долар
document.addEventListener('DOMContentLoaded', function() {
    function replaceEuroToDollar() {
        const euroElements = document.querySelectorAll('[data-cur="€"], span[data-cur="€"]');
        euroElements.forEach(function(el) {
            el.setAttribute('data-cur', '$');
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });
        const textElements = document.querySelectorAll('.new_r-currency-switch span');
        textElements.forEach(function(el) {
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });
    }
    replaceEuroToDollar();
    const observer = new MutationObserver(function() { replaceEuroToDollar(); });
    observer.observe(document.body, { childList: true, subtree: true });
});

// КОЛІР РАМКИ РЕЙТИНГУ (ДЛЯ ВСІХ КЛАСІВ - p8, p7, p6, p5)
document.addEventListener('DOMContentLoaded', function() {
    function updateRatingBorderColor() {
        const ratingContainers = document.querySelectorAll('.new_r-p8, .new_r-p7, .new_r-p6, .new_r-p5, .new_r-item-rating-container');
        ratingContainers.forEach(function(container) {
            const ratingValueElement = container.querySelector('.new_r-item-rating-value');
            if (!ratingValueElement) return;
            const ratingText = ratingValueElement.textContent || ratingValueElement.innerText;
            const rating = parseFloat(ratingText);
            if (isNaN(rating)) return;
            let color;
            if (rating < 5) color = '#ef4444';
            else if (rating >= 5 && rating < 7.5) color = '#eab308';
            else color = '#22c55e';
            container.style.borderColor = color;
            ratingValueElement.style.color = color;
        });
    }
    updateRatingBorderColor();
    const observer = new MutationObserver(function() { updateRatingBorderColor(); });
    observer.observe(document.body, { childList: true, subtree: true });
});
</script>
<script>
// ========== ПЕРЕХОПЛЕННЯ КЛІКІВ НА ТУРИ (ПОКРАЩЕНИЙ) ==========
(function() {
    console.log('Скрипт перехоплення активовано');

    function extractParamsFromUrl(url) {
        // Шукаємо параметри в різних форматах
        let hid = url.match(/hid=(\d+)/)?.[1];
        let oid = url.match(/oid=([\d]+)/)?.[1];
        let od = url.match(/od=([\d-]+)/)?.[1];
        let ol = url.match(/ol=(\d+)/)?.[1];

        // Якщо не знайшли в прямому вигляді, шукаємо в хеші
        if (!hid) {
            let hash = url.split('#')[1] || '';
            hid = hash.match(/hid=(\d+)/)?.[1];
            oid = hash.match(/oid=([\d]+)/)?.[1];
            od = hash.match(/od=([\d-]+)/)?.[1];
            ol = hash.match(/ol=(\d+)/)?.[1];
        }

        return { hid, oid, od, ol };
    }

    function handleTourClick(event) {
        // Шукаємо елемент, на який клікнули
        let target = event.target.closest('.new_r-item, .new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
        if (!target) return;

        // Отримуємо URL
        let url = target.href || target.getAttribute('data-uri') || '';

        // Якщо клікнули на картку, але не на посилання - шукаємо посилання всередині
        if (!url && target.classList.contains('new_r-item')) {
            let link = target.querySelector('a');
            if (link) url = link.href;
        }

        if (!url || (!url.includes('hid=') && !url.includes('#!'))) return;

        event.preventDefault();
        event.stopPropagation();

        let params = extractParamsFromUrl(url);

        if (params.hid && params.oid) {
            let baseUrl = window.location.pathname.startsWith('/a/')
                ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
                : '/tour-detail/';

            let newUrl = `${baseUrl}?hid=${params.hid}&oid=${params.oid}&od=${params.od || ''}&ol=${params.ol || ''}`;
            console.log('Перенаправляємо на:', newUrl);
            window.location.href = newUrl;
        } else {
            console.log('Не знайдено параметри туру в URL:', url);
        }
    }

    // Додаємо обробник кліків
    document.addEventListener('click', handleTourClick);
})();
</script>
<script>
// ========== ЗБЕРІГАЄМО URL ПОШУКУ ДЛЯ КНОПКИ "ПОВЕРНУТИСЯ" ==========
(function() {
    // Зберігаємо поточний URL при завантаженні сторінки
    localStorage.setItem('lastSearchUrl', window.location.href);
    console.log('Збережено URL пошуку:', window.location.href);

    // Також зберігаємо при кліку на тур (на випадок, якщо URL зміниться)
    document.addEventListener('click', function(e) {
        const tourLink = e.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
        if (tourLink) {
            localStorage.setItem('lastSearchUrl', window.location.href);
            console.log('Оновлено URL пошуку перед переходом:', window.location.href);
        }
    });
})();
</script>
<script>
// ========== МОБІЛЬНІ ФІЛЬТРИ З ВИСУВАННЯМ ==========
(function() {
    if (window.innerWidth > 768) return;

    setTimeout(function() {
        const filtersContainer = document.querySelector('.new_f-ext-container');
        const filterBtn = document.querySelector('.new_f-ext-btn');

        if (!filtersContainer || !filterBtn) return;

        if (!filtersContainer.querySelector('.new_f-dropdown-body-top')) {
            const header = document.createElement('div');
            header.className = 'new_f-dropdown-body-top';
            header.innerHTML = 'Фільтри <div class="new_f-dropdown-body-close">×</div>';
            filtersContainer.insertBefore(header, filtersContainer.firstChild);
        }

        if (!document.querySelector('.filter-open-btn')) {
            const openBtn = document.createElement('button');
            openBtn.className = 'filter-open-btn';
            openBtn.innerHTML = '<i class="fa-regular fa-filter"></i> Фільтри';
            document.body.appendChild(openBtn);

            openBtn.addEventListener('click', function() {
                filtersContainer.classList.add('open');
            });
        }

        const closeBtn = filtersContainer.querySelector('.new_f-dropdown-body-close');
        if (closeBtn) {
            closeBtn.addEventListener('click', function() {
                filtersContainer.classList.remove('open');
            });
        }

        const cancelBtn = filtersContainer.querySelector('.new_f-dropdown-btn-cancel');
        if (cancelBtn) {
            cancelBtn.addEventListener('click', function() {
                filtersContainer.classList.remove('open');
            });
        }

        const applyBtn = filtersContainer.querySelector('.new_f-dropdown-btn-apply');
        if (applyBtn) {
            applyBtn.addEventListener('click', function() {
                setTimeout(() => {
                    filtersContainer.classList.remove('open');
                }, 500);
            });
        }

        console.log('✅ Мобільні фільтри налаштовано');
    }, 1000);
})();
</script>

<!-- ========== АДАПТИВНІ ФІЛЬТРИ ДЛЯ МОБІЛЬНИХ ========== -->
<style>
/* ========== ФІЛЬТРИ - АДАПТИВНІ, НЕ ПЕРЕКРИВАЮТЬ ТУРИ ========== */

/* Перевизначаємо стилі фільтрів для мобільних */
@media (max-width: 768px) {
    /* Фільтри - звичайний блок, не фіксований */
    .new_f-ext-container {
        position: relative !important;
        top: auto !important;
        bottom: auto !important;
        left: auto !important;
        right: auto !important;
        transform: none !important;
        max-height: none !important;
        overflow: visible !important;
        display: block !important;
        background: #f8f9fa !important;
        border-radius: 16px !important;
        padding: 12px !important;
        margin: 15px 0 !important;
        border: 1px solid #e2e8f0 !important;
        box-shadow: none !important;
    }

    /* Прибираємо кнопку відкриття */
    .filter-open-btn {
        display: none !important;
    }

    /* Фільтри завжди видимі */
    .new_f-ext-container.open {
        transform: none !important;
    }

    /* Сітка фільтрів - 2 колонки */
    .new_f-ext-body {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 10px !important;
    }

    .new_f-ext-col {
        width: 100% !important;
        min-width: 0 !important;
        background: white !important;
        padding: 10px !important;
        border-radius: 12px !important;
        margin: 0 !important;
    }

    /* Заголовки */
    .new_f-ext-bl-title {
        font-size: 12px !important;
        margin-bottom: 8px !important;
        font-weight: 700 !important;
    }

    /* Чекбокси вертикально */
    .new_f-ext-bl-body {
        display: flex !important;
        flex-direction: column !important;
        gap: 5px !important;
    }

    .new_f-ext-bl-body label {
        display: flex !important;
        align-items: center !important;
        gap: 5px !important;
        font-size: 11px !important;
        margin: 0 !important;
        white-space: normal !important;
    }

    /* Кнопка очищення */
    .new_f-ext-clear-btn {
        grid-column: span 2 !important;
        margin-top: 10px !important;
        padding: 8px !important;
        font-size: 12px !important;
        text-align: center !important;
    }

    /* Ховаємо непотрібні елементи */
    .new_f-dropdown-body-top,
    .new_f-dropdown-body-bottom,
    .new_f-ext-btn-container {
        display: none !important;
    }
}

/* Для дуже маленьких екранів - 1 колонка */
@media (max-width: 480px) {
    .new_f-ext-body {
        grid-template-columns: 1fr !important;
    }

    .new_f-ext-clear-btn {
        grid-column: span 1 !important;
    }
}

/* Прибираємо непотрібні стилі, які заважають */
.new_f-ext-btn,
.new_f-dropdown-body-top,
.new_f-dropdown-body-bottom {
    display: none !important;
}
</style>

<script>
// ========== ВИПРАВЛЕННЯ ДЛЯ МОБІЛЬНИХ ФІЛЬТРІВ ==========
(function() {
    if (window.innerWidth > 768) return;

    setTimeout(function() {
        const filtersContainer = document.querySelector('.new_f-ext-container');
        if (filtersContainer) {
            // Видаляємо зайві елементи
            const topEl = filtersContainer.querySelector('.new_f-dropdown-body-top');
            if (topEl) topEl.remove();

            const bottomEl = filtersContainer.querySelector('.new_f-dropdown-body-bottom');
            if (bottomEl) bottomEl.remove();

            // Видаляємо кнопку відкриття, якщо вона є
            const openBtn = document.querySelector('.filter-open-btn');
            if (openBtn) openBtn.remove();

            // Фільтри завжди видимі
            filtersContainer.classList.remove('open');
            filtersContainer.style.position = 'relative';
            filtersContainer.style.transform = 'none';

            console.log('✅ Мобільні фільтри адаптовані');
        }
    }, 1000);
})();
</script>
{% endblock %}
