{% extends "base.html" %}
{% load static %}

{% block title %}Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4" style="color: #000000; text-align: left;">Результати пошуку турів</h2>

            <!-- МОДУЛЬ ПОШУКУ OTPUSK -->
            {% include "tours/otpusk_search.html" %}
        </div>
    </div>
</div>

<!-- ========== СТИЛІ ДЛЯ РЕЗУЛЬТАТІВ ========== -->
<style>
#otpusk-search-module {
    background: white !important;
    border-radius: 24px !important;
    border: 2px solid var(--primary-color) !important;
    padding: 20px 24px !important;
    width: 100% !important;
    margin: 0 auto !important;
    box-sizing: border-box !important;
}

.new_f-form-submit {
    background: var(--primary-color) !important;
    color: white !important;
    border-radius: 10px !important;
    border: none !important;
    font-weight: 600 !important;
    padding: 12px 28px !important;
    cursor: pointer !important;
}

/* КАРТКИ ТУРІВ */
.new_r-item {
    background: white !important;
    border-radius: 16px !important;
    border: 1px solid #e2e8f0 !important;
    margin-bottom: 24px !important;
    overflow: hidden !important;
    display: flex !important;
    flex-direction: row !important;
    width: 100% !important;
}

.new_r-item-img {
    width: 280px !important;
    height: auto !important;
    object-fit: cover !important;
    flex-shrink: 0 !important;
}

.new_r-item-body {
    padding: 18px 22px !important;
    flex: 1 !important;
}

.new_r-item-hotel {
    font-size: 1.3rem !important;
    font-weight: 700 !important;
    color: #1a202c !important;
}

/* ЦІНА */
.new_price-value {
    color: #dc2626 !important;
    font-weight: 700 !important;
    font-size: 1.25rem !important;
}

/* ПЕРЕМИКАННЯ ВАЛЮТИ */
.new_r-currency-switch {
    display: flex !important;
    background: var(--primary-color) !important;
    border-radius: 24px !important;
    overflow: hidden !important;
    width: fit-content !important;
}

.new_r-currency-switch span {
    background: transparent !important;
    color: white !important;
    padding: 6px 16px !important;
    cursor: pointer !important;
}

.new_r-currency-switch input[type="radio"]:checked + span {
    background: rgba(255, 255, 255, 0.25) !important;
}

/* РЕЙТИНГ */
.new_r-item-rating-container,
.new_r-p8, .new_r-p7, .new_r-p6, .new_r-p5 {
    position: absolute !important;
    top: 12px !important;
    right: 12px !important;
    width: 65px !important;
    height: 65px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: white !important;
    border-radius: 10px !important;
    border-width: 2px !important;
    border-style: solid !important;
}

.new_r-item-rating-value {
    font-weight: 800 !important;
    font-size: 1.1rem !important;
}

/* АДАПТИВ */
@media (max-width: 768px) {
    #otpusk-search-module {
        padding: 15px !important;
    }
    .new_r-item {
        flex-direction: column !important;
    }
    .new_r-item-img {
        width: 100% !important;
        height: 220px !important;
    }
}
</style>

<script>
// Заміна євро на долар
document.addEventListener('DOMContentLoaded', function() {
    function replaceEuroToDollar() {
        const euroElements = document.querySelectorAll('[data-cur="€"], span[data-cur="€"]');
        euroElements.forEach(function(el) {
            el.setAttribute('data-cur', '$');
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });
    }
    replaceEuroToDollar();
    const observer = new MutationObserver(function() { replaceEuroToDollar(); });
    observer.observe(document.body, { childList: true, subtree: true });
});

// Колір рамки рейтингу
document.addEventListener('DOMContentLoaded', function() {
    function updateRatingBorderColor() {
        const ratingContainers = document.querySelectorAll('.new_r-p8, .new_r-p7, .new_r-p6, .new_r-p5, .new_r-item-rating-container');
        ratingContainers.forEach(function(container) {
            const ratingValueElement = container.querySelector('.new_r-item-rating-value');
            if (!ratingValueElement) return;
            const rating = parseFloat(ratingValueElement.textContent);
            if (isNaN(rating)) return;
            let color;
            if (rating < 5) color = '#ef4444';
            else if (rating >= 5 && rating < 7.5) color = '#eab308';
            else color = '#22c55e';
            container.style.borderColor = color;
            ratingValueElement.style.color = color;
        });
    }
    updateRatingBorderColor();
    const observer = new MutationObserver(function() { updateRatingBorderColor(); });
    observer.observe(document.body, { childList: true, subtree: true });
});

// Перехоплення кліків на тури
(function() {
    function extractParamsFromUrl(url) {
        let hid = url.match(/hid=(\d+)/)?.[1];
        let oid = url.match(/oid=([\d]+)/)?.[1];
        let od = url.match(/od=([\d-]+)/)?.[1];
        let ol = url.match(/ol=(\d+)/)?.[1];

        if (!hid) {
            let hash = url.split('#')[1] || '';
            hid = hash.match(/hid=(\d+)/)?.[1];
            oid = hash.match(/oid=([\d]+)/)?.[1];
            od = hash.match(/od=([\d-]+)/)?.[1];
            ol = hash.match(/ol=(\d+)/)?.[1];
        }
        return { hid, oid, od, ol };
    }

    function handleTourClick(event) {
        let target = event.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
        if (!target) return;

        let url = target.href || '';
        if (!url && target.closest('.new_r-item')) {
            let link = target.closest('.new_r-item').querySelector('a');
            if (link) url = link.href;
        }

        if (!url || !url.includes('hid=')) return;

        event.preventDefault();
        event.stopPropagation();

        let params = extractParamsFromUrl(url);
        if (params.hid && params.oid) {
            let baseUrl = window.location.pathname.startsWith('/a/')
                ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
                : '/tour-detail/';
            let newUrl = `${baseUrl}?hid=${params.hid}&oid=${params.oid}&od=${params.od || ''}&ol=${params.ol || ''}`;
            window.location.href = newUrl;
        }
    }

    document.addEventListener('click', handleTourClick);
})();
</script>
{% endblock %}
