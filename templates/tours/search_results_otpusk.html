{% extends "base.html" %}
{% load static %}

{% block title %}🔍 Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="text-center mb-4" style="color: var(--primary-color);">🔍 Результати пошуку турів</h2>
            <div id="otpusk-search-module">
                <script>
                    var osGeo = '';
                    var osDefaultDeparture = '';
                    var osDefaultDuration = '';
                    var osDateFrom = '';
                    var osDateTo = '';
                    var osHotelCategory = '';
                    var osFood = '';
                    var osTransport = '';
                    var osTarget = '';
                    var osContainer = null;
                    var osTourContainer = null;
                    var osLang = 'ua';
                    var osTourTargetBlank = false;
                    var osOrderUrl = null;
                    var osCurrency = 'converted';
                    var osAutoStart = false;
                </script>
                <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
                <script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
                <script src="https://export.otpusk.com/js/onsite/"></script>
                <script src="https://export.otpusk.com/js/order"></script>
            </div>
        </div>
    </div>
</div>
<style>
/* Бічна панель для фільтрів */
#otpusk-search-module {
    display: flex !important;
    flex-direction: row !important;
    gap: 30px !important;
    flex-wrap: wrap !important;
}

/* Контейнер фільтрів (розширений пошук) */
.new_f-ext-container {
    width: 280px !important;
    flex-shrink: 0 !important;
    position: sticky !important;
    top: 100px !important;
    align-self: flex-start !important;
    background: #f8f9fa !important;
    border-radius: 16px !important;
    padding: 20px !important;
    border: 1px solid #e2e8f0 !important;
}

/* Контейнер результатів */
.new_r-container {
    flex: 1 !important;
    min-width: 300px !important;
}

/* Приховуємо кнопку "Розширений пошук", бо фільтри вже видно */
.new_f-ext-btn {
    display: none !important;
}

/* Показуємо контейнер фільтрів завжди */
.new_f-ext-container {
    display: block !important;
}

/* Стиль для кнопок фільтрів */
.new_f-ext-clear-btn,
.new_f-dropdown-bottom-btn.new_f-dropdown-btn-apply {
    width: 100% !important;
    margin-top: 10px !important;
}

/* Мобільна версія - фільтри зверху */
@media (max-width: 768px) {
    #otpusk-search-module {
        flex-direction: column !important;
    }

    .new_f-ext-container {
        width: 100% !important;
        position: relative !important;
        top: 0 !important;
        margin-bottom: 20px !important;
    }
}
</style>
{% endblock %}
