            <!-- ========== ДОДАТКОВИЙ СКРИПТ ДЛЯ АВТОМАТИЧНОГО ВИБОРУ ОБОХ ДАТ ========== -->
            <!-- ========== ДОДАТКОВИЙ СКРИПТ ДЛЯ АВТОМАТИЧНОГО ВИБОРУ ========== -->
<script>
(function() {
    if (window.searchResultsDateSet) return;
    window.searchResultsDateSet = true;

    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
    const departureText = urlParams.get('departure_text') || '';
    const autoSearch = urlParams.get('auto_search') === '1';

    console.log('📥 Параметри:', { geo, departureText, autoSearch });

    let searchTriggered = false;
    let countrySelected = false;
    let departureSelected = false;

    // ========== ВИБІР КРАЇНИ (ПОСИЛЕНИЙ) ==========
    function setCountry() {
        if (!geo || countrySelected) return;

        console.log('🌍 Шукаємо країну:', geo);

        const countryInput = document.querySelector('#location');
        if (!countryInput) {
            console.log('⏳ Поле країни ще не з\'явилось');
            setTimeout(setCountry, 300);
            return;
        }

        // Встановлюємо значення
        countryInput.value = geo;
        countryInput.dispatchEvent(new Event('input', { bubbles: true }));
        countryInput.dispatchEvent(new Event('change', { bubbles: true }));

        // Шукаємо і клікаємо на країну в списку
        setTimeout(() => {
            const items = document.querySelectorAll('#cntList .ui-menu-item, .ui-autocomplete li');
            console.log('📋 Знайдено елементів у списку:', items.length);

            for (let item of items) {
                const text = item.innerText || item.textContent;
                console.log('🔍 Перевіряємо:', text);

                if (text && text.toLowerCase().trim() === geo.toLowerCase().trim()) {
                    const link = item.querySelector('a') || item;
                    link.click();
                    countrySelected = true;
                    console.log('✅ Вибрано країну:', geo);

                    // Після вибору країни, вибираємо місто вильоту
                    if (departureText && !departureSelected) {
                        setTimeout(setDeparture, 500);
                    }
                    return;
                }
            }

            // Якщо не знайшли, пробуємо ще раз
            if (!countrySelected) {
                console.log('❌ Не знайдено країну, пробуємо ще...');
                setTimeout(setCountry, 500);
            }
        }, 400);
    }

    // ========== ВИБІР МІСТА ВИЛЬОТУ ==========
    function setDeparture() {
        if (!departureText || departureSelected) return;

        console.log('🛫 Шукаємо місто вильоту:', departureText);

        const searchCity = departureText.replace('з ', '').trim();

        function trySelect() {
            const departureBtn = document.querySelector('#new_os-from .new_f-dropdown-btn');
            if (!departureBtn) {
                setTimeout(trySelect, 300);
                return;
            }

            // Перевіряємо, чи вже вибрано правильне місто
            const currentText = departureBtn.innerText;
            if (currentText.includes(searchCity) || currentText === departureText) {
                console.log('✅ Вже вибрано:', currentText);
                departureSelected = true;
                return;
            }

            departureBtn.click();
            console.log('📋 Відкрито список міст');

            setTimeout(() => {
                const items = document.querySelectorAll('#new_os-from .new_f-dropdown-item');
                let found = false;

                for (let item of items) {
                    const itemText = item.innerText.trim();
                    if (itemText === departureText ||
                        itemText === searchCity ||
                        itemText.toLowerCase() === searchCity.toLowerCase()) {
                        item.click();
                        found = true;
                        departureSelected = true;
                        console.log('✅ Вибрано місто вильоту:', itemText);
                        break;
                    }
                }

                if (!found) {
                    console.log('❌ Не знайдено місто:', departureText);
                }
            }, 400);
        }

        trySelect();
    }

    // ========== ЗАПУСК ПОШУКУ ==========
    function triggerSearch() {
        if (searchTriggered) return;

        // Чекаємо, поки країна вибрана
        if (autoSearch && countrySelected) {
            setTimeout(() => {
                const searchBtn = document.querySelector('.new_f-form-submit');
                if (searchBtn) {
                    searchBtn.click();
                    searchTriggered = true;
                    console.log('🔍 Пошук запущено!');
                }
            }, 800);
        } else if (autoSearch && !countrySelected && geo) {
            console.log('⏳ Чекаємо вибору країни...');
            setTimeout(triggerSearch, 500);
        }
    }

    // ========== ІНІЦІАЛІЗАЦІЯ ==========
    function init() {
        // Спочатку вибираємо країну
        setCountry();

        // Запускаємо перевірку для авто-пошуку
        if (autoSearch) {
            setTimeout(triggerSearch, 1500);
            setTimeout(triggerSearch, 2500);
            setTimeout(triggerSearch, 3500);
        }
    }

    setTimeout(init, 500);
})();
</script>

<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';

    if (!geo) return;

    const confirmed = localStorage.getItem('country_confirmed_' + encodeURIComponent(geo));
    if (confirmed === 'true') return;

    function showWarning() {
        const existingWarning = document.querySelector('.orange-warning');
        if (existingWarning) existingWarning.remove();

        const warning = document.createElement('div');
        warning.className = 'orange-warning';
        warning.innerHTML = `
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Підтвердіть країну <strong class="country-name">${geo}</strong> → натисніть на поле "Країна" або "Пошук"</span>
        `;
        document.body.appendChild(warning);

        warning.addEventListener('click', function() {
            const countryInput = document.querySelector('#location');
            if (countryInput) {
                countryInput.style.transition = 'box-shadow 0.2s';
                countryInput.style.boxShadow = '0 0 0 3px #f59e0b';
                countryInput.focus();
                setTimeout(() => { countryInput.style.boxShadow = ''; }, 2000);
            }
            warning.remove();
        });

        setTimeout(() => {
            if (warning.parentNode) warning.remove();
        }, 7000);
    }

    setTimeout(showWarning, 1500);
})();
</script>

<!-- ========== ТІЛЬКИ ОДИН СКРИПТ В КІНЦІ ФАЙЛУ ========== -->
<script>
// Перехоплення кліків на тури
document.addEventListener('click', function(e) {
    let target = e.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
    if (!target) return;

    let url = target.href || '';
    if (!url && target.closest('.new_r-item')) {
        let link = target.closest('.new_r-item').querySelector('a');
        if (link) url = link.href;
    }

    if (!url || !url.includes('hid=')) return;

    e.preventDefault();

    let hid = url.match(/hid=(\d+)/)?.[1];
    let oid = url.match(/oid=([\d]+)/)?.[1];
    let od = url.match(/od=([\d-]+)/)?.[1];
    let ol = url.match(/ol=(\d+)/)?.[1];

    if (hid && oid) {
        let baseUrl = window.location.pathname.startsWith('/a/')
            ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
            : '/tour-detail/';
        window.location.href = `${baseUrl}?hid=${hid}&oid=${oid}&od=${od || ''}&ol=${ol || ''}`;
    }
});
</script>

    color: #000000 !important;
}

.new_f-title {
    color: #000000 !important;
}
</style>
<!-- ========== ФІКС ФОНУ ФОРМИ ПОШУКУ ========== -->
<style>
/* Робимо фон форми пошуку білим */
.new_f-container,
.new_f-wrapper,
.new_f-wrapper-bg-imgs,
.new_f-form {
    background: #ffffff !important;
    background-color: #ffffff !important;
    background-image: none !important;
}

/* Видаляємо градієнт і робимо фон білим */
.new_f-container {
    background: #ffffff !important;
    background-image: none !important;
    box-shadow: none !important;
}

/* Додатково для будь-яких інших елементів */
.new_f-wrapper-bg-imgs {
    display: none !important;
}
</style>
<!-- ========== ГОЛОВНИЙ ФІКС КНОПКИ "ПОШУК" ========== -->
<script>
(function() {
    function fixSearchButton() {
        const btn = document.querySelector('.new_f-form-submit');
        if (!btn) return false;
        if (btn.getAttribute('data-fixed') === 'true') return true;

        btn.textContent = 'Пошук';
        btn.style.whiteSpace = 'nowrap';
        btn.style.width = 'auto';
        btn.style.minWidth = '80px';
        btn.style.padding = '10px 20px';
        btn.setAttribute('data-fixed', 'true');
        console.log('✅ Кнопку змінено на "Пошук"');
        return true;
    }

    // Спроба одразу
    if (fixSearchButton()) return;

    // Спостерігаємо за появою кнопки
    const observer = new MutationObserver(function() {
        if (fixSearchButton()) observer.disconnect();
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Запасні варіанти
    setTimeout(fixSearchButton, 3000);
    setTimeout(fixSearchButton, 5000);
    setTimeout(fixSearchButton, 7000);
})();
</script>
