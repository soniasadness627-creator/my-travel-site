<!-- ========== ФІКС ДАТ: ПРИМУСОВО 1 ДЕНЬ ========== -->
<script>
(function() {
    // Перехоплюємо параметри з URL і змінюємо duration на 1
    const originalPushState = history.pushState;
    history.pushState = function() {
        const result = originalPushState.apply(this, arguments);
        fixDatesAndSearch();
        return result;
    };

    function fixDatesAndSearch() {
        // Змінюємо duration в URL на 1
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('duration') !== '1') {
            urlParams.set('duration', '1');
            const newUrl = window.location.pathname + '?' + urlParams.toString();
            history.replaceState({}, '', newUrl);
            console.log('✅ duration змінено на 1 в URL');
        }

        // Шукаємо поле тривалості і змінюємо
        setTimeout(() => {
            const durationSelect = document.querySelector('#night, select[name="duration"], .new_f-duration-select');
            if (durationSelect) {
                durationSelect.value = '1';
                durationSelect.dispatchEvent(new Event('change', { bubbles: true }));
                console.log('✅ Тривалість змінена на 1 день');
            }
        }, 500);
    }

    fixDatesAndSearch();
})();
</script>

<!-- ========== ПРИМУСОВИЙ ВИБІР ОДНАКОВИХ ДАТ ========== -->
<script>
(function() {
    function selectSameDates() {
        // Знаходимо кнопки з датами
        const startBtn = document.querySelector('.new_f-datepicker-wrap-1 button');
        const endBtn = document.querySelector('.new_f-datepicker-wrap-2 button');

        if (!startBtn || !endBtn) return;

        const startText = startBtn.innerText || startBtn.textContent;
        const endText = endBtn.innerText || endBtn.textContent;

        console.log('📅 Початкова дата:', startText);
        console.log('📅 Кінцева дата:', endText);

        // Якщо дати різні
        if (startText !== endText) {
            console.log('🔄 Дати різні, виправляємо...');

            // Відкриваємо календар закінчення
            endBtn.click();

            setTimeout(() => {
                // Шукаємо елемент з датою початку в календарі
                const dateCells = document.querySelectorAll('.ui-datepicker-calendar td a');
                const dayNum = startText.match(/\d+/)?.[0] || startText;

                for (let cell of dateCells) {
                    if (cell.innerText === dayNum) {
                        cell.click();
                        console.log('✅ Дата закінчення змінена на', startText);
                        break;
                    }
                }

                // Закриваємо календар
                setTimeout(() => {
                    const closeBtn = document.querySelector('.ui-datepicker-close, .ui-datepicker-buttonpane button:first-child');
                    if (closeBtn) closeBtn.click();
                }, 100);
            }, 200);
        }
    }

    // Запускаємо з різними затримками
    setTimeout(selectSameDates, 1000);
    setTimeout(selectSameDates, 2000);
    setTimeout(selectSameDates, 3000);
    setTimeout(selectSameDates, 4000);
    setTimeout(selectSameDates, 5000);
})();
</script>

<script>
// Заміна євро на долар
document.addEventListener('DOMContentLoaded', function() {
    function replaceEuroToDollar() {
        const euroElements = document.querySelectorAll('[data-cur="€"], span[data-cur="€"]');
        euroElements.forEach(function(el) {
            el.setAttribute('data-cur', '$');
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });
        const textElements = document.querySelectorAll('.new_r-currency-switch span');
        textElements.forEach(function(el) {
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });
    }
    replaceEuroToDollar();
    const observer = new MutationObserver(function() { replaceEuroToDollar(); });
    observer.observe(document.body, { childList: true, subtree: true });
});

// КОЛІР РАМКИ РЕЙТИНГУ (ДЛЯ ВСІХ КЛАСІВ - p8, p7, p6, p5)
document.addEventListener('DOMContentLoaded', function() {
    function updateRatingBorderColor() {
        const ratingContainers = document.querySelectorAll('.new_r-p8, .new_r-p7, .new_r-p6, .new_r-p5, .new_r-item-rating-container');
        ratingContainers.forEach(function(container) {
            const ratingValueElement = container.querySelector('.new_r-item-rating-value');
            if (!ratingValueElement) return;
            const ratingText = ratingValueElement.textContent || ratingValueElement.innerText;
            const rating = parseFloat(ratingText);
            if (isNaN(rating)) return;
            let color;
            if (rating < 5) color = '#ef4444';
            else if (rating >= 5 && rating < 7.5) color = '#eab308';
            else color = '#22c55e';
            container.style.borderColor = color;
            ratingValueElement.style.color = color;
        });
    }
    updateRatingBorderColor();
    const observer = new MutationObserver(function() { updateRatingBorderColor(); });
    observer.observe(document.body, { childList: true, subtree: true });
});
</script>
<script>
// ========== ПЕРЕХОПЛЕННЯ КЛІКІВ НА ТУРИ (ПОКРАЩЕНИЙ) ==========
(function() {
    console.log('Скрипт перехоплення активовано');

    function extractParamsFromUrl(url) {
        // Шукаємо параметри в різних форматах
        let hid = url.match(/hid=(\d+)/)?.[1];
        let oid = url.match(/oid=([\d]+)/)?.[1];
        let od = url.match(/od=([\d-]+)/)?.[1];
        let ol = url.match(/ol=(\d+)/)?.[1];

        // Якщо не знайшли в прямому вигляді, шукаємо в хеші
        if (!hid) {
            let hash = url.split('#')[1] || '';
            hid = hash.match(/hid=(\d+)/)?.[1];
            oid = hash.match(/oid=([\d]+)/)?.[1];
            od = hash.match(/od=([\d-]+)/)?.[1];
            ol = hash.match(/ol=(\d+)/)?.[1];
        }

        return { hid, oid, od, ol };
    }

    function handleTourClick(event) {
        // Шукаємо елемент, на який клікнули
        let target = event.target.closest('.new_r-item, .new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
        if (!target) return;

        // Отримуємо URL
        let url = target.href || target.getAttribute('data-uri') || '';

        // Якщо клікнули на картку, але не на посилання - шукаємо посилання всередині
        if (!url && target.classList.contains('new_r-item')) {
            let link = target.querySelector('a');
            if (link) url = link.href;
        }

        if (!url || (!url.includes('hid=') && !url.includes('#!'))) return;

        event.preventDefault();
        event.stopPropagation();

        let params = extractParamsFromUrl(url);

        if (params.hid && params.oid) {
            let baseUrl = window.location.pathname.startsWith('/a/')
                ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
                : '/tour-detail/';

            let newUrl = `${baseUrl}?hid=${params.hid}&oid=${params.oid}&od=${params.od || ''}&ol=${params.ol || ''}`;
            console.log('Перенаправляємо на:', newUrl);
            window.location.href = newUrl;
        } else {
            console.log('Не знайдено параметри туру в URL:', url);
        }
    }

    // Додаємо обробник кліків
    document.addEventListener('click', handleTourClick);
})();
</script>

<script>
// ========== МОБІЛЬНІ ФІЛЬТРИ З ВИСУВАННЯМ + ФІКС ТРИВАЛОСТІ 1 ДЕНЬ ==========
(function() {
    // ========== 1. ФІКС ТРИВАЛОСТІ ТУРУ НА 1 ДЕНЬ ==========
    setTimeout(function() {
        // Шукаємо всі можливі поля з тривалістю
        const durationSelect = document.querySelector('#night, select[name="duration"], .new_f-duration-select');
        if (durationSelect) {
            durationSelect.value = '1';
            durationSelect.dispatchEvent(new Event('change', { bubbles: true }));
            console.log('✅ Тривалість змінена на 1 день');
        }

        // Шукаємо hidden input
        const durationInput = document.querySelector('input[name="duration"]');
        if (durationInput && durationInput.value !== '1') {
            durationInput.value = '1';
            durationInput.dispatchEvent(new Event('change', { bubbles: true }));
            console.log('✅ Hidden duration змінено на 1');
        }

        // Змінюємо параметр в URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('duration') !== '1') {
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('duration', '1');
            window.history.replaceState({}, '', newUrl);
            console.log('✅ URL duration змінено на 1');
        }
    }, 500);

    // ========== 2. МОБІЛЬНІ ФІЛЬТРИ З ВИСУВАННЯМ ==========
    if (window.innerWidth > 768) return;

    setTimeout(function() {
        const filtersContainer = document.querySelector('.new_f-ext-container');
        const filterBtn = document.querySelector('.new_f-ext-btn');

        if (!filtersContainer || !filterBtn) return;

        if (!filtersContainer.querySelector('.new_f-dropdown-body-top')) {
            const header = document.createElement('div');
            header.className = 'new_f-dropdown-body-top';
            header.innerHTML = 'Фільтри <div class="new_f-dropdown-body-close">×</div>';
            filtersContainer.insertBefore(header, filtersContainer.firstChild);
        }

        if (!document.querySelector('.filter-open-btn')) {
            const openBtn = document.createElement('button');
            openBtn.className = 'filter-open-btn';
            openBtn.innerHTML = '<i class="fa-regular fa-filter"></i> Фільтри';
            document.body.appendChild(openBtn);

            openBtn.addEventListener('click', function() {
                filtersContainer.classList.add('open');
            });
        }

        const closeBtn = filtersContainer.querySelector('.new_f-dropdown-body-close');
        if (closeBtn) {
            closeBtn.addEventListener('click', function() {
                filtersContainer.classList.remove('open');
            });
        }

        const cancelBtn = filtersContainer.querySelector('.new_f-dropdown-btn-cancel');
        if (cancelBtn) {
            cancelBtn.addEventListener('click', function() {
                filtersContainer.classList.remove('open');
            });
        }

        const applyBtn = filtersContainer.querySelector('.new_f-dropdown-btn-apply');
        if (applyBtn) {
            applyBtn.addEventListener('click', function() {
                setTimeout(() => {
                    filtersContainer.classList.remove('open');
                }, 500);
            });
        }

        console.log('✅ Мобільні фільтри налаштовано');
    }, 1000);
})();
</script>

<!-- ========== ФІНАЛЬНЕ ВИДАЛЕННЯ ПОВІДОМЛЕННЯ OTPUSK ========== -->
<script>
(function() {
    'use strict';

    // Функція, яка повністю видаляє елемент, а не просто ховає
    function removeOtpuskMessage() {
        // Шукаємо всі можливі варіанти повідомлення
        const selectors = [
            '.new_os-date-check',
            '.new_os-date-check-wrapper',
            '.new_f-validate-message',
            '.new_f-dropdown-msg',
            '#new_os-date-check'
        ];

        for (const selector of selectors) {
            const elements = document.querySelectorAll(selector);
            elements.forEach(el => {
                if (el && el.remove) {
                    el.remove();
                    console.log('🗑️ Видалено елемент:', selector);
                }
            });
        }

        // Шукаємо будь-який елемент, що містить текст повідомлення
        const allDivs = document.querySelectorAll('div, span, p, .new_f-dropdown-body');
        allDivs.forEach(el => {
            const text = (el.innerText || '').toLowerCase();
            if ((text.includes('виберіть країну') ||
                 text.includes('виберіть курорт') ||
                 text.includes('виберіть готель') ||
                 text.includes('clubdator')) &&
                text.length < 200) {
                if (el.remove) el.remove();
                else el.style.display = 'none';
                console.log('🗑️ Видалено повідомлення за текстом');
            }
        });
    }

    // Запускаємо негайно
    removeOtpuskMessage();

    // Запускаємо з різними затримками (бо Otpusk створює елемент пізніше)
    const delays = [100, 300, 500, 800, 1000, 1500, 2000, 3000, 5000];
    delays.forEach(delay => {
        setTimeout(removeOtpuskMessage, delay);
    });

    // Спостерігаємо за змінами в DOM
    if (window.MutationObserver) {
        const observer = new MutationObserver(function(mutations) {
            // Перевіряємо, чи з'явилося повідомлення
            let shouldRemove = false;
            for (const mutation of mutations) {
                if (mutation.addedNodes.length) {
                    shouldRemove = true;
                    break;
                }
            }
            if (shouldRemove) {
                removeOtpuskMessage();
            }
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });

        // Зупиняємо спостерігач через 10 секунд, щоб не навантажувати
        setTimeout(() => observer.disconnect(), 10000);
    }
})();
</script>
<script>
// ========== ГАРАНТОВАНИЙ ЗАПУСК ПОШУКУ ==========
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo');

    if (!geo) return;

    let searchTriggered = false;

    // Спостерігаємо за появою кнопки пошуку
    const observer = new MutationObserver(function() {
        const searchBtn = document.querySelector('.new_f-form-submit');
        const locationInput = document.querySelector('#location');

        if (searchBtn && locationInput && !searchTriggered) {
            // Якщо поле пусте – заповнюємо
            if (locationInput.value === '') {
                locationInput.value = decodeURIComponent(geo);
                locationInput.dispatchEvent(new Event('input', { bubbles: true }));
                locationInput.dispatchEvent(new Event('change', { bubbles: true }));

                setTimeout(() => {
                    searchBtn.click();
                    searchTriggered = true;
                    console.log('✅ Пошук примусово запущено');
                }, 1000);
            }
            // Якщо поле заповнене, але пошук не запускався
            else if (!searchTriggered) {
                setTimeout(() => {
                    if (!searchTriggered) {
                        searchBtn.click();
                        searchTriggered = true;
                        console.log('✅ Пошук запущено (поле вже заповнене)');
                    }
                }, 500);
            }
        }
    });

    observer.observe(document.body, { childList: true, subtree: true });

    // Запасний варіант через 4 секунди
    setTimeout(() => {
        const searchBtn = document.querySelector('.new_f-form-submit');
        if (searchBtn && !searchTriggered) {
            searchBtn.click();
            searchTriggered = true;
            console.log('✅ Пошук запущено (таймаут)');
        }
    }, 4000);
})();
</script>

<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';

    if (!geo) return;

    // Перевіряємо, чи країна вже підтверджена
    const confirmed = localStorage.getItem('confirmed_' + encodeURIComponent(geo));
    if (confirmed === 'true') return;

    function showNotify() {
        const notify = document.createElement('div');
        notify.className = 'simple-notify';
        notify.innerHTML = `
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Підтвердіть країну <strong class="country">${geo}</strong> → натисніть на поле "Країна"</span>
        `;

        document.body.appendChild(notify);

        // Зникає через 5 секунд
        setTimeout(() => {
            notify.style.opacity = '0';
            notify.style.transform = 'translateX(100px)';
            notify.style.transition = 'all 0.3s ease';
            setTimeout(() => notify.remove(), 300);
        }, 5000);

        // При кліку на повідомлення – підсвічуємо поле
        notify.addEventListener('click', function() {
            const countryInput = document.querySelector('#location');
            if (countryInput) {
                countryInput.style.transition = 'box-shadow 0.2s';
                countryInput.style.boxShadow = '0 0 0 3px #f59e0b';
                countryInput.focus();
                setTimeout(() => {
                    countryInput.style.boxShadow = '';
                }, 2000);
            }
            notify.remove();
        });
    }

    setTimeout(showNotify, 1500);
})();
</script>
<script>
// ========== ПРИМУСОВЕ ВСТАНОВЛЕННЯ ДАТИ З URL (ДУБЛЮВАННЯ ДЛЯ НАДІЙНОСТІ) ==========
(function() {
    setTimeout(function() {
        const urlParams = new URLSearchParams(window.location.search);
        const dateFrom = urlParams.get('date_from');

        if (!dateFrom) return;

        const dayNum = dateFrom.split('.')[0];

        // Знаходимо всі клітинки з датами в календарі
        const allDateCells = document.querySelectorAll('.ui-datepicker-calendar td a');

        for (let cell of allDateCells) {
            if (cell.innerText === dayNum) {
                cell.click();
                console.log('🔧 ПРИМУСОВО вибрано дату:', dateFrom);
                break;
            }
        }
    }, 3000);
})();
</script>
