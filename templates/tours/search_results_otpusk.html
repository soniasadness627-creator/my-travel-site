{% extends "base.html" %}
{% load static %}

{% block title %}Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4" style="color: #000000; text-align: left;">Результати пошуку турів</h2>

            <!-- МОДУЛЬ ПОШУКУ OTPUSK (ТІЛЬКИ ОДИН РАЗ!) -->
            {% include "tours/otpusk_search.html" %}
        </div>
    </div>
</div>

<!-- ========== СТИЛІ ДЛЯ СТОРІНКИ РЕЗУЛЬТАТІВ ========== -->
<style>
#otpusk-search-module {
    background: white !important;
    border-radius: 24px !important;
    border: 2px solid var(--primary-color) !important;
    padding: 20px 24px !important;
    width: 100% !important;
    margin: 0 auto !important;
}

.new_f-form-submit {
    background: var(--primary-color) !important;
    color: white !important;
    border-radius: 10px !important;
    border: none !important;
    font-weight: 600 !important;
    padding: 12px 28px !important;
    cursor: pointer !important;
}

/* СІРИЙ ФОН ДЛЯ ДНІВ БЕЗ ЦІН */
.price-column.gray {
    background: #e0e0e0 !important;
}

/* КАРТКИ ТУРІВ */
.new_r-item {
    background: white !important;
    border-radius: 16px !important;
    border: 1px solid #e2e8f0 !important;
    margin-bottom: 24px !important;
    overflow: hidden !important;
    display: flex !important;
    flex-direction: row !important;
    width: 100% !important;
}

.new_r-item-img {
    width: 280px !important;
    height: auto !important;
    object-fit: cover !important;
    flex-shrink: 0 !important;
}

.new_r-item-body {
    padding: 18px 22px !important;
    flex: 1 !important;
}

.new_r-item-hotel {
    font-size: 1.3rem !important;
    font-weight: 700 !important;
    color: #1a202c !important;
}

.new_price-value {
    color: #dc2626 !important;
    font-weight: 700 !important;
    font-size: 1.25rem !important;
}

/* РЕЙТИНГ */
.new_r-item-rating-container {
    position: absolute !important;
    top: 12px !important;
    right: 12px !important;
    width: 65px !important;
    height: 65px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: white !important;
    border-radius: 10px !important;
    border-width: 2px !important;
    border-style: solid !important;
}

.new_r-item-rating-value {
    font-weight: 800 !important;
    font-size: 1.1rem !important;
}

/* ВИДАЛЕННЯ ПОВІДОМЛЕННЯ */
.new_os-date-check {
    display: none !important;
}

/* АДАПТИВ */
@media (max-width: 768px) {
    .new_r-item {
        flex-direction: column !important;
    }
    .new_r-item-img {
        width: 100% !important;
        height: 220px !important;
    }
}
</style>

<script>
// Перехоплення кліків на тури
document.addEventListener('click', function(e) {
    let target = e.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
    if (!target) return;

    let url = target.href || '';
    if (!url && target.closest('.new_r-item')) {
        let link = target.closest('.new_r-item').querySelector('a');
        if (link) url = link.href;
    }

    if (!url || !url.includes('hid=')) return;

    e.preventDefault();

    let hid = url.match(/hid=(\d+)/)?.[1];
    let oid = url.match(/oid=([\d]+)/)?.[1];
    let od = url.match(/od=([\d-]+)/)?.[1];
    let ol = url.match(/ol=(\d+)/)?.[1];

    if (hid && oid) {
        let baseUrl = window.location.pathname.startsWith('/a/')
            ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
            : '/tour-detail/';
        window.location.href = `${baseUrl}?hid=${hid}&oid=${oid}&od=${od || ''}&ol=${ol || ''}`;
    }
});
</script>
<!-- ========== ОРАНЖЕВЕ ПОПЕРЕДЖЕННЯ ДЛЯ ПІДТВЕРДЖЕННЯ КРАЇНИ (ТІЛЬКИ НА СТОРІНЦІ РЕЗУЛЬТАТІВ) ========== -->
<style>
.orange-warning {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #fff3e0;
    border-left: 5px solid #f59e0b;
    border-radius: 12px;
    padding: 14px 20px;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    z-index: 100000;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInRight 0.3s ease;
    cursor: pointer;
}
@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100px); }
    to { opacity: 1; transform: translateX(0); }
}
.orange-warning i { font-size: 20px; color: #f59e0b; }
.orange-warning span { font-size: 14px; color: #92400e; }
.orange-warning .country-name { font-weight: 700; background: #fffbeb; padding: 3px 8px; border-radius: 20px; margin-left: 5px; }
</style>

<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';

    if (!geo) return;

    const confirmed = localStorage.getItem('country_confirmed_' + encodeURIComponent(geo));
    if (confirmed === 'true') return;

    function showWarning() {
        const existingWarning = document.querySelector('.orange-warning');
        if (existingWarning) existingWarning.remove();

        const warning = document.createElement('div');
        warning.className = 'orange-warning';
        warning.innerHTML = `
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Підтвердіть країну <strong class="country-name">${geo}</strong> → натисніть на поле "Країна" або "Пошук"</span>
        `;
        document.body.appendChild(warning);

        warning.addEventListener('click', function() {
            const countryInput = document.querySelector('#location');
            if (countryInput) {
                countryInput.style.transition = 'box-shadow 0.2s';
                countryInput.style.boxShadow = '0 0 0 3px #f59e0b';
                countryInput.focus();
                setTimeout(() => { countryInput.style.boxShadow = ''; }, 2000);
            }
            warning.remove();
        });

        setTimeout(() => {
            if (warning.parentNode) warning.remove();
        }, 7000);
    }

    setTimeout(showWarning, 1500);
})();
</script>
{% endblock %}
