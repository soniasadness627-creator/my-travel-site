{% extends "base.html" %}
{% load static %}

{% block title %}Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-4" style="color: #000000; text-align: left;">Результати пошуку турів</h2>

            <!-- ========== ФОРМА ПОШУКУ OTPUSK ========== -->
            <div id="otpusk-search-module"></div>

            <!-- ========== НАЛАШТУВАННЯ OTPUSK ========== -->
            <script>
            // Отримуємо параметри з URL
            const urlParams = new URLSearchParams(window.location.search);
            const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
            const departureText = urlParams.get('departure_text') || '';

            console.log('📥 Параметри для Otpusk:', { geo, departureText });

            // Налаштування для Otpusk
            var osGeo = geo;
            var osDefaultDeparture = '';
            var osDefaultDuration = '';
            var osDateFrom = '';
            var osDateTo = '';
            var osHotelCategory = '';
            var osFood = '';
            var osTransport = '';
            var osTarget = window.location.pathname;
            var osContainer = 'otpusk-search-module';
            var osTourContainer = null;
            var osLang = 'ua';
            var osTourTargetBlank = false;
            var osOrderUrl = null;
            var osCurrency = 'converted';
            var osAutoStart = false;
            </script>

            <!-- Підключення скриптів Otpusk -->
            <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
            <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
            <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
            <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
            <script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
            <script src="https://export.otpusk.com/js/onsite/"></script>
            <script src="https://export.otpusk.com/js/order"></script>

            <!-- ========== СКРИПТ ДЛЯ АВТОМАТИЧНОГО ВИБОРУ КРАЇНИ ТА МІСТА ========== -->
            <script>
            (function() {
                if (window.searchResultsDateSet) return;
                window.searchResultsDateSet = true;

                const urlParams = new URLSearchParams(window.location.search);
                const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
                const departureText = urlParams.get('departure_text') || '';
                const autoSearch = urlParams.get('auto_search') === '1';

                console.log('📥 Параметри:', { geo, departureText, autoSearch });

                let searchTriggered = false;
                let countrySelected = false;
                let departureSelected = false;

                function setCountry() {
                    if (!geo || countrySelected) return;
                    console.log('🌍 Шукаємо країну:', geo);

                    const countryInput = document.querySelector('#location');
                    if (!countryInput) {
                        setTimeout(setCountry, 300);
                        return;
                    }

                    countryInput.value = geo;
                    countryInput.dispatchEvent(new Event('input', { bubbles: true }));
                    countryInput.dispatchEvent(new Event('change', { bubbles: true }));

                    setTimeout(() => {
                        const items = document.querySelectorAll('#cntList .ui-menu-item, .ui-autocomplete li');
                        for (let item of items) {
                            const text = item.innerText || item.textContent;
                            if (text && text.toLowerCase().trim() === geo.toLowerCase().trim()) {
                                const link = item.querySelector('a') || item;
                                link.click();
                                countrySelected = true;
                                console.log('✅ Вибрано країну:', geo);
                                if (departureText && !departureSelected) {
                                    setTimeout(setDeparture, 500);
                                }
                                return;
                            }
                        }
                        if (!countrySelected) {
                            setTimeout(setCountry, 500);
                        }
                    }, 400);
                }

                function setDeparture() {
                    if (!departureText || departureSelected) return;
                    console.log('🛫 Шукаємо місто вильоту:', departureText);

                    const searchCity = departureText.replace('з ', '').trim();

                    function trySelect() {
                        const departureBtn = document.querySelector('#new_os-from .new_f-dropdown-btn');
                        if (!departureBtn) {
                            setTimeout(trySelect, 300);
                            return;
                        }

                        const currentText = departureBtn.innerText;
                        if (currentText.includes(searchCity) || currentText === departureText) {
                            departureSelected = true;
                            return;
                        }

                        departureBtn.click();

                        setTimeout(() => {
                            const items = document.querySelectorAll('#new_os-from .new_f-dropdown-item');
                            for (let item of items) {
                                const itemText = item.innerText.trim();
                                if (itemText === departureText ||
                                    itemText === searchCity ||
                                    itemText.toLowerCase() === searchCity.toLowerCase()) {
                                    item.click();
                                    departureSelected = true;
                                    console.log('✅ Вибрано місто вильоту:', itemText);
                                    break;
                                }
                            }
                        }, 400);
                    }
                    trySelect();
                }

                function triggerSearch() {
                    if (searchTriggered) return;
                    if (autoSearch && countrySelected) {
                        setTimeout(() => {
                            const searchBtn = document.querySelector('.new_f-form-submit');
                            if (searchBtn) {
                                searchBtn.click();
                                searchTriggered = true;
                                console.log('🔍 Пошук запущено!');
                            }
                        }, 800);
                    } else if (autoSearch && !countrySelected && geo) {
                        setTimeout(triggerSearch, 500);
                    }
                }

                function init() {
                    setCountry();
                    if (autoSearch) {
                        setTimeout(triggerSearch, 1500);
                        setTimeout(triggerSearch, 2500);
                        setTimeout(triggerSearch, 3500);
                    }
                }

                setTimeout(init, 500);
            })();
            </script>
        </div>
    </div>
</div>


<!-- ========== СТИЛІ ДЛЯ КАРТОК ТУРІВ ========== -->

</style>

<!-- ========== ПЕРЕХОПЛЕННЯ КЛІКІВ НА ТУРИ ========== -->
<script>
document.addEventListener('click', function(e) {
    let target = e.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
    if (!target) return;

    let url = target.href || '';
    if (!url && target.closest('.new_r-item')) {
        let link = target.closest('.new_r-item').querySelector('a');
        if (link) url = link.href;
    }

    if (!url || !url.includes('hid=')) return;

    e.preventDefault();

    let hid = url.match(/hid=(\d+)/)?.[1];
    let oid = url.match(/oid=([\d]+)/)?.[1];
    let od = url.match(/od=([\d-]+)/)?.[1];
    let ol = url.match(/ol=(\d+)/)?.[1];

    if (hid && oid) {
        let baseUrl = window.location.pathname.startsWith('/a/')
            ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
            : '/tour-detail/';
        window.location.href = `${baseUrl}?hid=${hid}&oid=${oid}&od=${od || ''}&ol=${ol || ''}`;
    }
});
</script>
