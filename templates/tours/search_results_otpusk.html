            <!-- ========== ДОДАТКОВИЙ СКРИПТ ДЛЯ АВТОМАТИЧНОГО ВИБОРУ ОБОХ ДАТ ========== -->
            <script>
            (function() {
                if (window.searchResultsDateSet) return;
                window.searchResultsDateSet = true;

                const urlParams = new URLSearchParams(window.location.search);
                const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
                const departureText = urlParams.get('departure_text') || '';
                const dateFrom = urlParams.get('date_from') || '';
                const dateTo = urlParams.get('date_to') || '';

                console.log('📥 search_results_otpusk отримав:', { geo, departureText, dateFrom, dateTo });

                if (!dateFrom) return;

                let dateFromSet = false;
                let dateToSet = false;

                function setBothDates() {
                    const dayNum = dateFrom.split('.')[0];
                    console.log('📅 Встановлюємо дату:', dateFrom, 'день:', dayNum);

                    if (!dateFromSet) {
                        const startBtn = document.querySelector('.new_f-datepicker-wrap-1 button');
                        if (startBtn) {
                            startBtn.click();
                            console.log('📅 Календар ПОЧАТКУ відкрито');

                            setTimeout(() => {
                                const cells = document.querySelectorAll('.ui-datepicker-calendar td a');
                                for (let cell of cells) {
                                    if (cell.innerText === dayNum) {
                                        cell.click();
                                        dateFromSet = true;
                                        console.log('✅ Дата ПОЧАТКУ вибрана:', dateFrom);
                                        break;
                                    }
                                }

                                setTimeout(() => {
                                    if (!dateToSet) {
                                        const endBtn = document.querySelector('.new_f-datepicker-wrap-2 button');
                                        if (endBtn) {
                                            endBtn.click();
                                            console.log('📅 Календар КІНЦЯ відкрито');

                                            setTimeout(() => {
                                                const endCells = document.querySelectorAll('.ui-datepicker-calendar td a');
                                                for (let cell of endCells) {
                                                    if (cell.innerText === dayNum) {
                                                        cell.click();
                                                        dateToSet = true;
                                                        console.log('✅ Дата КІНЦЯ вибрана (ТАКА САМА):', dateFrom);
                                                        break;
                                                    }
                                                }

                                                setTimeout(() => {
                                                    const closeBtn = document.querySelector('.ui-datepicker-close, .ui-datepicker-buttonpane button:first-child');
                                                    if (closeBtn) closeBtn.click();
                                                    console.log('✅ Календар закрито');
                                                }, 100);
                                            }, 200);
                                        }
                                    }
                                }, 300);
                            }, 200);
                        }
                    }
                }

                setTimeout(setBothDates, 1500);
                setTimeout(setBothDates, 2500);
                setTimeout(setBothDates, 3500);
                setTimeout(setBothDates, 4500);
            })();
            </script>

<script>
// Перехоплення кліків на тури
document.addEventListener('click', function(e) {
    let target = e.target.closest('.new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
    if (!target) return;

    let url = target.href || '';
    if (!url && target.closest('.new_r-item')) {
        let link = target.closest('.new_r-item').querySelector('a');
        if (link) url = link.href;
    }

    if (!url || !url.includes('hid=')) return;

    e.preventDefault();

    let hid = url.match(/hid=(\d+)/)?.[1];
    let oid = url.match(/oid=([\d]+)/)?.[1];
    let od = url.match(/od=([\d-]+)/)?.[1];
    let ol = url.match(/ol=(\d+)/)?.[1];

    if (hid && oid) {
        let baseUrl = window.location.pathname.startsWith('/a/')
            ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
            : '/tour-detail/';
        window.location.href = `${baseUrl}?hid=${hid}&oid=${oid}&od=${od || ''}&ol=${ol || ''}`;
    }
});

// ========== МОБІЛЬНІ ФІЛЬТРИ З ВИСУВАННЯМ ==========
(function() {
    const isMobile = window.innerWidth <= 768;
    if (!isMobile) return;

    setTimeout(function() {
        const filtersContainer = document.querySelector('.new_f-ext-container');
        const filterBtn = document.querySelector('.new_f-ext-btn');

        if (!filtersContainer || !filterBtn) return;

        if (!filtersContainer.querySelector('.new_f-dropdown-body-top')) {
            const header = document.createElement('div');
            header.className = 'new_f-dropdown-body-top';
            header.innerHTML = 'Фільтри <div class="new_f-dropdown-body-close">×</div>';
            filtersContainer.insertBefore(header, filtersContainer.firstChild);
        }

        if (!filtersContainer.querySelector('.new_f-dropdown-body-bottom')) {
            const footer = document.createElement('div');
            footer.className = 'new_f-dropdown-body-bottom';
            footer.innerHTML = `
                <div class="new_f-dropdown-btn-cancel">Скасувати</div>
                <div class="new_f-dropdown-btn-apply">Застосувати</div>
            `;
            filtersContainer.appendChild(footer);
        }

        filterBtn.addEventListener('click', function() {
            filtersContainer.classList.add('open');
        });

        const closeBtn = filtersContainer.querySelector('.new_f-dropdown-body-close');
        if (closeBtn) {
            closeBtn.addEventListener('click', function() {
                filtersContainer.classList.remove('open');
            });
        }

        const cancelBtn = filtersContainer.querySelector('.new_f-dropdown-btn-cancel');
        if (cancelBtn) {
            cancelBtn.addEventListener('click', function() {
                filtersContainer.classList.remove('open');
            });
        }

        const applyBtn = filtersContainer.querySelector('.new_f-dropdown-btn-apply');
        if (applyBtn) {
            applyBtn.addEventListener('click', function() {
                setTimeout(() => {
                    filtersContainer.classList.remove('open');
                }, 500);
            });
        }

        console.log('✅ Мобільні фільтри налаштовано');
    }, 1000);
})();
</script>

<!-- ========== ОРАНЖЕВЕ ПОПЕРЕДЖЕННЯ ДЛЯ ПІДТВЕРДЖЕННЯ КРАЇНИ ========== -->
<style>
.orange-warning {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #fff3e0;
    border-left: 5px solid #f59e0b;
    border-radius: 12px;
    padding: 14px 20px;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    z-index: 100000;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInRight 0.3s ease;
    cursor: pointer;
}
@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100px); }
    to { opacity: 1; transform: translateX(0); }
}
.orange-warning i { font-size: 20px; color: #f59e0b; }
.orange-warning span { font-size: 14px; color: #92400e; }
.orange-warning .country-name { font-weight: 700; background: #fffbeb; padding: 3px 8px; border-radius: 20px; margin-left: 5px; }
</style>

<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';

    if (!geo) return;

    const confirmed = localStorage.getItem('country_confirmed_' + encodeURIComponent(geo));
    if (confirmed === 'true') return;

    function showWarning() {
        const existingWarning = document.querySelector('.orange-warning');
        if (existingWarning) existingWarning.remove();

        const warning = document.createElement('div');
        warning.className = 'orange-warning';
        warning.innerHTML = `
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Підтвердіть країну <strong class="country-name">${geo}</strong> → натисніть на поле "Країна" або "Пошук"</span>
        `;
        document.body.appendChild(warning);

        warning.addEventListener('click', function() {
            const countryInput = document.querySelector('#location');
            if (countryInput) {
                countryInput.style.transition = 'box-shadow 0.2s';
                countryInput.style.boxShadow = '0 0 0 3px #f59e0b';
                countryInput.focus();
                setTimeout(() => { countryInput.style.boxShadow = ''; }, 2000);
            }
            warning.remove();
        });

        setTimeout(() => {
            if (warning.parentNode) warning.remove();
        }, 7000);
    }

    setTimeout(showWarning, 1500);
})();
</script>
