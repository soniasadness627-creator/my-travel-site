{% extends "base.html" %}
{% load static %}

{% block title %}Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="text-center mb-4" style="color: var(--primary-color);">Результати пошуку турів</h2>
            <div id="otpusk-search-module">
                <script>
                    var osGeo = '';
                    var osDefaultDeparture = '';
                    var osDefaultDuration = '';
                    var osDateFrom = '';
                    var osDateTo = '';
                    var osHotelCategory = '';
                    var osFood = '';
                    var osTransport = '';
                    var osTarget = '';
                    var osContainer = null;
                    var osTourContainer = null;
                    var osLang = 'ua';
                    var osTourTargetBlank = false;
                    var osOrderUrl = null;
                    var osCurrency = 'converted';
                    var osAutoStart = false;
                </script>
                <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/form.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
                <link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />
                <script src="https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca"></script>
                <script src="https://export.otpusk.com/js/onsite/"></script>
                <script src="https://export.otpusk.com/js/order"></script>
            </div>
        </div>
    </div>
</div>

<style>
/* ========== ОСНОВНІ СТИЛІ ========== */

/* Контейнер модуля */
#otpusk-search-module {
    background: white !important;
    border-radius: 24px !important;
    border: 2px solid var(--primary-color) !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05) !important;
    padding: 20px 24px !important;
    width: 100% !important;
    margin: 0 auto !important;
    position: relative !important;
    z-index: 10 !important;
}

/* Кнопка "Знайти" */
.new_f-form-submit {
    background: var(--primary-color) !important;
    color: white !important;
    border-radius: 10px !important;
    border: none !important;
    font-weight: 600 !important;
    padding: 12px 28px !important;
    transition: all 0.3s ease !important;
    cursor: pointer !important;
}

.new_f-form-submit:hover {
    background: var(--primary-dark) !important;
}

/* ========== ЦІНА - ПРИБИРАЄМО КОЛІР ТА РАМКУ ========== */

/* Блок ціни - прибираємо фон, рамку, робимо чорним */
span.new_r-item-price,
.new_r-item-price,
.new_price-value,
.new_r-item-price .new_price-value {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    color: #1a202c !important;  /* Чорний колір */
    font-weight: 700 !important;
    font-size: 1.25rem !important;
}

/* Валюта в ціні (грн/$) - білий текст на фоні кольору агента */
.currency,
.new_r-item-price .currency,
span.currency {
    background: var(--primary-color) !important;
    color: white !important;
    padding: 2px 8px !important;
    border-radius: 20px !important;
    display: inline-block !important;
    font-weight: 600 !important;
    font-size: 0.85rem !important;
}

/* ========== КНОПКИ ПЕРЕМИКАННЯ ВАЛЮТИ (грн/$) ========== */

/* Основний стиль для кнопок валюти - ОБ'ЄДНАНИЙ */
.new_r-currency-switch span {
    background: var(--primary-color) !important;
    color: white !important;
    padding: 4px 12px !important;
    border-radius: 20px !important;
    display: inline-block !important;
    font-weight: 600 !important;
    font-size: 0.85rem !important;
    cursor: pointer !important;
    transition: all 0.3s ease !important;
}

/* ========== ЗІРКИ - ЖОВТІ ========== */

/* Зірки готелю - жовті */
.new_r-item-star {
    fill: #FFD700 !important;  /* Золотий/жовтий колір */
}

/* ========== ТРАНСПОРТ - КОЛІР АГЕНТА ========== */

/* Транспорт у фільтрах */
span.new_r-filter-value,
.new_r-filter-value {
    color: var(--primary-color) !important;
    font-weight: 500 !important;
}

/* Інші оранжеві елементи транспорту */
.new_r-item-transport,
.transport-value {
    color: var(--primary-color) !important;
}

/* ========== КНОПКИ ТА ЕЛЕМЕНТИ КЕРУВАННЯ ========== */

/* Кнопки перемикання валюти (грн/$) */
.new_r-currency-switch a,
.new_r-currency-switch span {
    color: var(--primary-color) !important;
}

.new_r-currency-switch a.active {
    background: var(--primary-color) !important;
    color: white !important;
}

/* Кнопка детальніше */
.new_r-detail-btn {
    background: var(--primary-color) !important;
    color: white !important;
    border: none !important;
    border-radius: 40px !important;
    padding: 8px 20px !important;
}

.new_r-detail-btn:hover {
    background: var(--primary-dark) !important;
}

/* Кнопки "Застосувати" у фільтрах */
.new_f-dropdown-bottom-btn.new_f-dropdown-btn-apply {
    background: var(--primary-color) !important;
    color: white !important;
    border: none !important;
    border-radius: 40px !important;
    padding: 10px !important;
}

/* Кнопка "Очистити фільтри" */
.new_f-ext-clear-btn {
    background: #e2e8f0 !important;
    color: #1a202c !important;
    border: none !important;
    border-radius: 40px !important;
    padding: 10px !important;
}

/* ========== ФІЛЬТРИ ========== */

/* Примусово показуємо фільтри */
.new_f-ext-container {
    display: block !important;
    background: #f8f9fa !important;
    border-radius: 16px !important;
    padding: 20px !important;
    border: 1px solid #e2e8f0 !important;
}

.new_f-ext-btn,
.new_f-dropdown-body-top {
    display: none !important;
}

/* Чекбокси та радіо при наведенні */
.new_f-ext-bl-body label:hover {
    border-color: var(--primary-color) !important;
}

/* Активні елементи в випадаючих списках */
.new_f-dropdown-item.selected {
    background: var(--primary-color) !important;
    color: white !important;
}

/* Посилання */
a {
    color: var(--primary-color) !important;
    text-decoration: none !important;
}

/* ========== КАРТКА ТУРУ ========== */

.new_r-item {
    background: white !important;
    border-radius: 16px !important;
    border: 1px solid #e2e8f0 !important;
    margin-bottom: 20px !important;
    overflow: hidden !important;
}

.new_r-item:hover {
    border-color: var(--primary-color) !important;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1) !important;
}

/* ========== МОБІЛЬНА ВЕРСІЯ ========== */
@media (max-width: 768px) {
    #otpusk-search-module {
        padding: 15px !important;
        margin: 0 15px !important;
        width: auto !important;
    }

    .new_f-dropdown-btn {
        width: 100% !important;
        padding: 10px 14px !important;
    }

    .new_f-form-submit {
        width: 100% !important;
        margin-top: 10px !important;
    }
}
</style>
{% endblock %}
