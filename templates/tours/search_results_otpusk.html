{% extends "base.html" %}
{% load static %}

{% block title %}Результати пошуку турів{% endblock %}

{% block content %}
<div class="container my-5">
    <div id="otpusk-results-container"></div>
</div>

<!-- Стилі для результатів пошуку -->
<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&subset=cyrillic" rel="stylesheet">
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/result.css" type="text/css" />
<link rel="Stylesheet" href="https://export.otpusk.com/os/onsite/tour.css" type="text/css" />

<script>
// Підключаємо модуль результатів пошуку Otpusk
(function() {
    var script = document.createElement('script');
    script.src = 'https://api.otpusk.com/api/2.4/session?access_token=3f94b-e4ff8-a72a7-4755f-da9ca';
    script.onload = function() {
        var osScript = document.createElement('script');
        osScript.src = 'https://export.otpusk.com/js/onsite/';
        osScript.onload = function() {
            // Віджет автоматично покаже результати, якщо вони є
            console.log('✅ Віджет результатів завантажено');
        };
        document.body.appendChild(osScript);
    };
    document.body.appendChild(script);
})();
</script>

<!-- Скрипт для перехоплення кліків на тури -->
<script>
(function() {
    function extractParamsFromUrl(url) {
        let hid = url.match(/hid=(\d+)/)?.[1];
        let oid = url.match(/oid=([\d]+)/)?.[1];
        let od = url.match(/od=([\d-]+)/)?.[1];
        let ol = url.match(/ol=(\d+)/)?.[1];

        if (!hid) {
            let hash = url.split('#')[1] || '';
            hid = hash.match(/hid=(\d+)/)?.[1];
            oid = hash.match(/oid=([\d]+)/)?.[1];
            od = hash.match(/od=([\d-]+)/)?.[1];
            ol = hash.match(/ol=(\d+)/)?.[1];
        }
        return { hid, oid, od, ol };
    }

    function handleTourClick(event) {
        let target = event.target.closest('.new_r-item, .new_r-item a, .new_t-order-btn, .new_t-order-btn-true');
        if (!target) return;

        let url = target.href || target.getAttribute('data-uri') || '';
        if (!url && target.classList.contains('new_r-item')) {
            let link = target.querySelector('a');
            if (link) url = link.href;
        }

        if (!url || (!url.includes('hid=') && !url.includes('#!'))) return;

        event.preventDefault();
        event.stopPropagation();

        let params = extractParamsFromUrl(url);

        if (params.hid && params.oid) {
            let baseUrl = window.location.pathname.startsWith('/a/')
                ? `/a/${window.location.pathname.split('/')[2]}/tour-detail/`
                : '/tour-detail/';

            let newUrl = `${baseUrl}?hid=${params.hid}&oid=${params.oid}&od=${params.od || ''}&ol=${params.ol || ''}`;
            window.location.href = newUrl;
        }
    }

    document.addEventListener('click', handleTourClick);
})();
</script>

<style>
    #otpusk-results-container {
        min-height: 400px;
    }
    .container.my-5 {
        max-width: 1400px !important;
    }
    @media (max-width: 768px) {
        .container.my-5 {
            padding-left: 10px;
            padding-right: 10px;
        }
    }
</style>

{% endblock %}
