<style>

span.new_r-item-price,

.new_r-currency-switch label {
    margin: 0 !important;

.new_r-currency-switch span {

.new_r-item-table .new_r-item-col {

</style>

<script>
// Заміна євро на долар
document.addEventListener('DOMContentLoaded', function() {
    function replaceEuroToDollar() {
        const euroElements = document.querySelectorAll('[data-cur="€"], span[data-cur="€"]');
        euroElements.forEach(function(el) {
            el.setAttribute('data-cur', '$');
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });
        const textElements = document.querySelectorAll('.new_r-currency-switch span');
        textElements.forEach(function(el) {
            if (el.textContent === '€') {
                el.textContent = '$';
            }
        });
    }
    replaceEuroToDollar();
    const observer = new MutationObserver(function() { replaceEuroToDollar(); });
    observer.observe(document.body, { childList: true, subtree: true });
});

// Колір рамки рейтингу
document.addEventListener('DOMContentLoaded', function() {
    function updateRatingBorderColor() {
        const ratingContainers = document.querySelectorAll('.new_r-p8');
        ratingContainers.forEach(function(container) {
            const ratingValueElement = container.querySelector('.new_r-item-rating-value');
            if (!ratingValueElement) return;
            const ratingText = ratingValueElement.textContent || ratingValueElement.innerText;
            const rating = parseFloat(ratingText);
            if (isNaN(rating)) return;
            let color;
            if (rating < 5) color = '#ef4444';
            else if (rating >= 5 && rating < 7.5) color = '#eab308';
            else color = '#22c55e';
            ratingValueElement.style.color = color;
        });
    }
    updateRatingBorderColor();
    const observer = new MutationObserver(function() { updateRatingBorderColor(); });
    observer.observe(document.body, { childList: true, subtree: true });
});
</script>
