<script>
(function() {
    function fixSearchButton() {
        const btn = document.querySelector('.new_f-form-submit');
        if (!btn) return false;

        // Змінюємо текст і стилі
        btn.textContent = 'Пошук';
        btn.style.whiteSpace = 'nowrap';
        btn.style.minWidth = 'auto';
        btn.style.width = 'auto';
        btn.style.padding = '10px 24px';
        btn.style.display = 'inline-flex';
        btn.style.alignItems = 'center';
        btn.style.justifyContent = 'center';
        btn.style.overflow = 'visible';

        console.log('✅ Кнопку змінено на "Пошук"');
        return true;
    }

    // Спроба зараз
    if (fixSearchButton()) return;

    // Спостерігаємо за появою кнопки
    const observer = new MutationObserver(function(mutations, obs) {
        if (fixSearchButton()) {
            obs.disconnect();
        }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Запасний варіант через 2 секунди
    setTimeout(fixSearchButton, 2000);
    setTimeout(fixSearchButton, 3000);
})();
</script>

 ========== СКРИПТ ДЛЯ ПЕРЕДАЧІ ПАРАМЕТРІВ У ФОРМУ ==========
<script>
(function() {
    // Захист від повторного виконання
    if (window.otpuskParamsSet) return;
    window.otpuskParamsSet = true;

    // Отримуємо параметри з URL
    const urlParams = new URLSearchParams(window.location.search);
    const geo = urlParams.get('geo') ? decodeURIComponent(urlParams.get('geo')) : '';
    const departureText = urlParams.get('departure_text') || '';
    const dateFrom = urlParams.get('date_from') || '';
    const duration = urlParams.get('duration') || '7';

    console.log('📥 Параметри для форми:', { geo, departureText, dateFrom, duration });

    if (geo || departureText || dateFrom) {
        let attempts = 0;
        let searchTriggered = false;

        function setFormValues() {
            attempts++;
            console.log(`🔄 Спроба ${attempts} встановлення параметрів...`);

            // Встановлюємо КРАЇНУ
            if (geo) {
                const countryInput = document.querySelector('#location');
                if (countryInput && countryInput.value !== geo) {
                    countryInput.value = geo;
                    countryInput.dispatchEvent(new Event('input', { bubbles: true }));
                    countryInput.dispatchEvent(new Event('change', { bubbles: true }));
                    console.log('✅ Встановлено країну:', geo);
                }
            }

            // Встановлюємо МІСТО ВИЛЬОТУ
            if (departureText) {
                setTimeout(() => {
                    const dropdownBtn = document.querySelector('#new_os-from .new_f-dropdown-btn');
                    if (dropdownBtn && !dropdownBtn.innerText.includes(departureText)) {
                        dropdownBtn.click();
                        setTimeout(() => {
                            const items = document.querySelectorAll('#new_os-from .new_f-dropdown-item');
                            for (let item of items) {
                                if (item.innerText.trim() === departureText) {
                                    item.click();
                                    console.log('✅ Клік по місту вильоту:', departureText);
                                    break;
                                }
                            }
                        }, 200);
                    }
                }, 500);
            }

            // Встановлюємо ДАТУ (однакова дата початку і кінця)
            if (dateFrom) {
                const dayNum = dateFrom.split('.')[0];
                console.log('📅 Вибрана дата:', dateFrom);

                setTimeout(() => {
                    const dateButton = document.querySelector('.new_f-datepicker-wrap-1 button');
                    if (dateButton) {
                        dateButton.click();

                        setTimeout(() => {
                            const dateCells = document.querySelectorAll('.ui-datepicker-calendar td a');
                            for (let cell of dateCells) {
                                if (cell.innerText === dayNum) {
                                    cell.click();
                                    console.log('✅ Клік по даті ПОЧАТКУ:', dateFrom);
                                    break;
                                }
                            }

                            // Закриваємо календар
                            setTimeout(() => {
                                const closeBtn = document.querySelector('.ui-datepicker-close, .ui-datepicker-buttonpane button:first-child');
                                if (closeBtn) closeBtn.click();
                            }, 100);
                        }, 200);
                    }
                }, 800);
            }

            // Запускаємо пошук (тільки один раз)
            if (!searchTriggered && (geo || departureText)) {
                setTimeout(() => {
                    const searchBtn = document.querySelector('.new_f-form-submit');
                    if (searchBtn) {
                        searchBtn.click();
                        searchTriggered = true;
                        console.log('🔍 Пошук запущено!');
                    }
                }, 1500);
            }
        }

        // Запускаємо кілька разів з затримками
        setTimeout(setFormValues, 1000);
        setTimeout(setFormValues, 2000);
        setTimeout(setFormValues, 3000);
        setTimeout(setFormValues, 4000);
    }
})();
</script>
 ========== ФІКС КНОПКИ "ЗНАЙТИ" -> "ПОШУК" ==========
<script>
(function() {
    // Функція зміни кнопки
    function fixSearchButton() {
        const btn = document.querySelector('.new_f-form-submit');
        if (!btn) return false;

        // Якщо текст вже "Пошук" – виходимо
        if (btn.textContent === 'Пошук') return true;

        // Змінюємо текст і стилі
        btn.textContent = 'Пошук';
        btn.style.whiteSpace = 'nowrap';
        btn.style.minWidth = 'auto';
        btn.style.width = 'auto';
        btn.style.padding = '10px 24px';
        btn.style.overflow = 'visible';

        console.log('✅ Кнопку змінено на "Пошук"');
        return true;
    }

    // Спроба змінити зараз
    if (fixSearchButton()) return;

    // Спостерігаємо за появою кнопки (оскільки вона створюється пізніше)
    const observer = new MutationObserver(function(mutations, obs) {
        if (fixSearchButton()) {
            obs.disconnect();
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });

    // Додаткова спроба через 2 секунди
    setTimeout(fixSearchButton, 2000);
    setTimeout(fixSearchButton, 3000);
})();
</script>
