{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header" style="background: var(--primary-color); color: white;">
                    <h2 class="mb-0">Допомогти обрати тур</h2>
                </div>
                <div class="card-body">
                    <p class="text-muted">Залиште свої контакти, і наш менеджер зв'яжеться з вами для підбору туру.</p>

                    <div id="phoneErrorGlobal" class="alert alert-warning d-none" style="font-size: 0.85rem; padding: 0.5rem 0.75rem; margin-bottom: 1rem;">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i> Будь ласка, введіть тільки цифри в номер телефону (9-15 цифр)
                    </div>

                    <form method="post" id="consultationForm">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <input type="hidden" name="next" value="{{ request.GET.next|default:request.META.HTTP_REFERER|default:'/' }}">
                        <button type="submit" class="btn w-100" id="submitBtn" style="background: var(--primary-color); color: white; border: none;">
                            Надіслати
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --primary-color: #086745;
        --primary-dark: #02432c;
        --primary-light: #2a6b5c;
        --primary-lighter: #cbf6ec;
        --accent-color: #e67e22;
        --bg-light: #f8f9fa;
    }

    /* Стилі для форми */
    .card {
        border-radius: 1rem;
        overflow: hidden;
    }
    .card-header {
        padding: 1rem 1.5rem;
    }
    .card-body {
        padding: 1.5rem;
    }
    .card-header h2 {
        font-size: 1.5rem;
        font-weight: 600;
    }

    /* Стилі для полів форми Django */
    form p {
        margin-bottom: 1rem;
    }
    form label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: #333;
    }
    form input, form select, form textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #ced4da;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    form input:focus, form select:focus, form textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 0.2rem rgba(8, 103, 69, 0.25);
    }
    form .helptext {
        display: block;
        font-size: 0.75rem;
        color: #6c757d;
        margin-top: 0.25rem;
    }
    form .errorlist {
        list-style: none;
        padding: 0;
        margin: 0 0 0.5rem 0;
        color: #dc3545;
        font-size: 0.8rem;
    }

    /* Стиль для помилки валідації */
    input.is-invalid {
        border-color: #ffc107 !important;
        box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25) !important;
    }

    .btn {
        transition: all 0.2s ease;
        padding: 0.5rem 1rem;
        font-weight: 500;
        border-radius: 0.5rem;
    }
    .btn:hover {
        background: var(--primary-dark) !important;
        transform: translateY(-1px);
        box-shadow: 0 2px 6px rgba(8, 103, 69, 0.2);
    }
</style>

<script>
// Захист для поля телефону на сторінці консультації
(function() {
    // Знаходимо поле телефону (воно створюється Django Form)
    const phoneInput = document.querySelector('input[name="phone"], input[type="tel"]');
    const submitBtn = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('phoneErrorGlobal');
    const form = document.getElementById('consultationForm');

    if (!phoneInput) {
        console.log('Поле телефону не знайдено');
        return;
    }

    // Додаємо ID для простого доступу
    phoneInput.id = 'consultationPhoneField';

    // Функція для перевірки валідності телефону
    function isValidPhone(value) {
        return /^[0-9]{9,15}$/.test(value);
    }

    // Функція для оновлення стилю поля
    function updatePhoneStyle() {
        const value = phoneInput.value;
        if (value.length > 0 && !isValidPhone(value)) {
            phoneInput.classList.add('is-invalid');
            if (errorDiv) errorDiv.classList.remove('d-none');
        } else {
            phoneInput.classList.remove('is-invalid');
            if (errorDiv) errorDiv.classList.add('d-none');
        }
    }

    // Блокуємо введення букв
    phoneInput.addEventListener('keypress', function(e) {
        const charCode = e.which ? e.which : e.keyCode;
        if (charCode > 31 && (charCode < 48 || charCode > 57)) {
            e.preventDefault();
            phoneInput.classList.add('is-invalid');
            if (errorDiv) errorDiv.classList.remove('d-none');
            return false;
        }
    });

    // Очищаємо вставлені значення
    phoneInput.addEventListener('input', function(e) {
        const numbers = this.value.replace(/[^0-9]/g, '');
        if (this.value !== numbers) {
            this.value = numbers;
        }
        updatePhoneStyle();
    });

    // Блокуємо вставку з буквами
    phoneInput.addEventListener('paste', function(e) {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text');
        const numbers = pasted.replace(/[^0-9]/g, '');
        this.value = numbers;
        updatePhoneStyle();
    });

    // При втраті фокусу перевіряємо
    phoneInput.addEventListener('blur', function() {
        updatePhoneStyle();
    });

    // При фокусі прибираємо помилку
    phoneInput.addEventListener('focus', function() {
        if (isValidPhone(this.value)) {
            if (errorDiv) errorDiv.classList.add('d-none');
            phoneInput.classList.remove('is-invalid');
        }
    });

    // Перевірка перед відправленням форми
    if (form) {
        form.addEventListener('submit', function(e) {
            const phoneValue = phoneInput.value;

            if (!isValidPhone(phoneValue)) {
                e.preventDefault();
                if (errorDiv) errorDiv.classList.remove('d-none');
                phoneInput.classList.add('is-invalid');

                // Прокручуємо до помилки
                errorDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return false;
            }
        });
    }
})();
</script>
{% endblock %}
