{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header" style="background: var(--primary-color); color: white;">
                    <h2 class="mb-0">Допомогти обрати тур</h2>
                </div>
                <div class="card-body">
                    <p class="text-muted">Залиште свої контакти, і наш менеджер зв'яжеться з вами для підбору туру.</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <input type="hidden" name="next" value="{{ request.GET.next|default:request.META.HTTP_REFERER|default:'/' }}">
                        <button type="submit" class="btn w-100" style="background: var(--primary-color); color: white; border: none;">Надіслати</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --primary-color: #086745;
        --primary-dark: #02432c;
        --primary-light: #2a6b5c;
        --primary-lighter: #cbf6ec;
        --accent-color: #e67e22;
        --bg-light: #f8f9fa;
    }

    /* Стилі для форми */
    .card {
        border-radius: 1rem;
        overflow: hidden;
    }
    .card-header {
        padding: 1rem 1.5rem;
    }
    .card-body {
        padding: 1.5rem;
    }
    .card-header h2 {
        font-size: 1.5rem;
        font-weight: 600;
    }

    /* Стилі для полів форми Django */
    form p {
        margin-bottom: 1rem;
    }
    form label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: #333;
    }
    form input, form select, form textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #ced4da;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    form input:focus, form select:focus, form textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 0.2rem rgba(8, 103, 69, 0.25);
    }
    form .helptext {
        display: block;
        font-size: 0.75rem;
        color: #6c757d;
        margin-top: 0.25rem;
    }
    form .errorlist {
        list-style: none;
        padding: 0;
        margin: 0 0 0.5rem 0;
        color: #dc3545;
        font-size: 0.8rem;
    }
    .btn {
        transition: all 0.2s ease;
        padding: 0.5rem 1rem;
        font-weight: 500;
        border-radius: 0.5rem;
    }
    .btn:hover {
        background: var(--primary-dark) !important;
        transform: translateY(-1px);
        box-shadow: 0 2px 6px rgba(8, 103, 69, 0.2);
    }
</style>
{% endblock %}
