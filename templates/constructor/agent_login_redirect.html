{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4">Вхід в кабінет агента</h2>
    <p>Введіть email, на який зареєстровано ваш сайт</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Відправити код</button>
    </form>
    <div class="text-center mt-3">
        <a href="{% url 'constructor:register' %}" class="text-decoration-none">
            Ще не маєте сайту? Створити
        </a>
    </div>
</div>
{% endblock %}
